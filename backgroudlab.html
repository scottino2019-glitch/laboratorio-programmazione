<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Lab Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .preview-area {
            min-height: 500px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.2s ease;
        }
        .canvas-hidden { display: none; }
        .control-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        input[type="range"] { accent-color: #3b82f6; width: 100%; cursor: pointer; }
        .active-style { border-color: #3b82f6; background-color: #eff6ff; color: #1e40af; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Background <span class="text-blue-600">Lab</span></h1>
            <p class="text-slate-500 mt-2 text-lg">Personalizza e scarica sfondi artistici per i tuoi progetti.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Pannello Sinistro: Controlli -->
            <div class="lg:col-span-4 space-y-6">
                
                <section class="control-card">
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-4 tracking-widest">1. Seleziona Stile</h2>
                    <div class="grid grid-cols-2 gap-3" id="styleButtons">
                        <!-- Generato da JS -->
                    </div>
                </section>

                <section class="control-card">
                    <h2 class="text-xs font-bold uppercase text-slate-400 mb-4 tracking-widest">2. Personalizzazione Avanzata</h2>
                    <div id="dynamicControls" class="space-y-5">
                        <!-- Caricato dinamicamente -->
                    </div>
                </section>

                <div class="space-y-3">
                    <button onclick="downloadImage()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Scarica PNG (1080p)
                    </button>
                    <button onclick="randomize()" class="w-full bg-white border border-slate-200 text-slate-600 font-medium py-2 rounded-xl hover:bg-slate-50 transition">
                        Genera Casuale
                    </button>
                </div>
            </div>

            <!-- Pannello Destro: Anteprima -->
            <div class="lg:col-span-8">
                <div id="previewContainer" class="preview-area">
                    <div id="overlayBox" class="p-8 rounded-2xl backdrop-blur-sm border shadow-lg max-w-sm text-center">
                        <h2 id="prevTitle" class="text-2xl font-bold mb-2">Titolo Esempio</h2>
                        <p id="prevText" class="text-sm opacity-80">Questo testo ti aiuta a capire se lo sfondo è leggibile per il tuo sito web.</p>
                    </div>
                </div>
                <div class="mt-4 flex items-center justify-between text-slate-400 text-sm">
                    <p>Modalità: <span id="modeName" class="font-bold text-slate-600">Lavagna</span></p>
                    <p>Risoluzione: 1920 x 1080</p>
                </div>
                <canvas id="mainCanvas" class="canvas-hidden"></canvas>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('previewContainer');
        const dynControls = document.getElementById('dynamicControls');
        const overlay = document.getElementById('overlayBox');
        
        canvas.width = 1920;
        canvas.height = 1080;

        const styles = {
            chalkboard: {
                name: 'Lavagna',
                params: { bg: '#1a1d20', chalk: '#ffffff', dust: 50, wear: 30, overlayColor: '#ffffff', overlayBg: 'rgba(255,255,255,0.1)' },
                controls: [
                    { id: 'bg', type: 'color', label: 'Colore Sfondo' },
                    { id: 'chalk', type: 'color', label: 'Colore Gesso' },
                    { id: 'dust', type: 'range', label: 'Polvere', min: 0, max: 100 },
                    { id: 'wear', type: 'range', label: 'Usura', min: 0, max: 100 },
                    { id: 'overlayColor', type: 'color', label: 'Colore Testo Anteprima' }
                ]
            },
            ricepaper: {
                name: 'Carta Riso',
                params: { bg: '#fdfbf7', fiber: '#e3dfd3', density: 40, roughness: 20, overlayColor: '#2d3436', overlayBg: 'rgba(0,0,0,0.05)' },
                controls: [
                    { id: 'bg', type: 'color', label: 'Tonalità Carta' },
                    { id: 'fiber', type: 'color', label: 'Colore Fibre' },
                    { id: 'density', type: 'range', label: 'Quantità Fibre', min: 0, max: 100 },
                    { id: 'roughness', type: 'range', label: 'Ruvidità', min: 0, max: 100 },
                    { id: 'overlayColor', type: 'color', label: 'Colore Testo Anteprima' }
                ]
            },
            graffiti: {
                name: 'Graffiti',
                params: { bg: '#bdc3c7', spray: '#e74c3c', text: 'ART', drips: 60, overlayColor: '#ffffff', overlayBg: 'rgba(0,0,0,0.3)' },
                controls: [
                    { id: 'bg', type: 'color', label: 'Colore Muro' },
                    { id: 'spray', type: 'color', label: 'Colore Spray' },
                    { id: 'text', type: 'text', label: 'Tag (Scritta)' },
                    { id: 'drips', type: 'range', label: 'Sgocciolamento', min: 0, max: 100 },
                    { id: 'overlayColor', type: 'color', label: 'Colore Testo Anteprima' }
                ]
            },
            notebook: {
                name: 'Quaderno',
                params: { bg: '#ffffff', line: '#d1d8e0', margin: '#ff7675', grid: false, spacing: 40, overlayColor: '#2d3436', overlayBg: 'rgba(255,255,255,0.8)' },
                controls: [
                    { id: 'bg', type: 'color', label: 'Colore Pagina' },
                    { id: 'line', type: 'color', label: 'Colore Righe' },
                    { id: 'margin', type: 'color', label: 'Colore Margine' },
                    { id: 'spacing', type: 'range', label: 'Spaziatura', min: 20, max: 100 },
                    { id: 'grid', type: 'checkbox', label: 'Modalità Quadretti' }
                ]
            },
            postcard: {
                name: 'Cartolina',
                params: { bg: '#f1e4d0', grunge: 40, borders: true, stamp: true, overlayColor: '#4b3621', overlayBg: 'rgba(255,255,255,0.2)' },
                controls: [
                    { id: 'bg', type: 'color', label: 'Base Vintage' },
                    { id: 'grunge', type: 'range', label: 'Invecchiamento', min: 0, max: 100 },
                    { id: 'borders', type: 'checkbox', label: 'Bordi Scuri' },
                    { id: 'stamp', type: 'checkbox', label: 'Includi Timbro' }
                ]
            }
        };

        let currentStyle = 'chalkboard';
        let currentParams = {};

        function init() {
            // Crea bottoni stili
            const btnContainer = document.getElementById('styleButtons');
            Object.keys(styles).forEach(key => {
                const btn = document.createElement('button');
                btn.innerText = styles[key].name;
                btn.className = "style-btn p-3 rounded-xl border-2 transition text-sm font-semibold border-slate-100 hover:border-blue-200";
                btn.onclick = () => selectStyle(key);
                btn.id = 'btn-' + key;
                btnContainer.appendChild(btn);
            });
            selectStyle('chalkboard');
        }

        function selectStyle(key) {
            currentStyle = key;
            currentParams = JSON.parse(JSON.stringify(styles[key].params));
            
            // Update UI
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active-style'));
            document.getElementById('btn-' + key).classList.add('active-style');
            document.getElementById('modeName').innerText = styles[key].name;

            renderControls();
            draw();
        }

        function renderControls() {
            dynControls.innerHTML = '';
            styles[currentStyle].controls.forEach(c => {
                const wrap = document.createElement('div');
                wrap.className = 'space-y-1';
                
                const label = document.createElement('label');
                label.className = 'block text-xs font-bold text-slate-500';
                label.innerText = c.label;
                
                let input;
                if(c.type === 'color') {
                    input = document.createElement('input');
                    input.type = 'color';
                    input.className = 'w-full h-10 rounded-lg cursor-pointer';
                    input.value = currentParams[c.id];
                } else if(c.type === 'range') {
                    input = document.createElement('input');
                    input.type = 'range';
                    input.min = c.min;
                    input.max = c.max;
                    input.value = currentParams[c.id];
                } else if(c.type === 'text') {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'w-full p-2 border rounded-lg text-sm';
                    input.value = currentParams[c.id];
                } else if(c.type === 'checkbox') {
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.className = 'w-5 h-5';
                    input.checked = currentParams[c.id];
                    wrap.className = 'flex items-center justify-between py-2';
                }

                input.oninput = (e) => {
                    currentParams[c.id] = c.type === 'checkbox' ? e.target.checked : e.target.value;
                    draw();
                };

                wrap.appendChild(label);
                wrap.appendChild(input);
                dynControls.appendChild(wrap);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currentParams.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Applica stile al box anteprima
            overlay.style.color = currentParams.overlayColor || '#000';
            overlay.style.backgroundColor = currentParams.overlayBg || 'rgba(255,255,255,0.5)';
            overlay.style.borderColor = (currentParams.overlayColor || '#000') + '33';

            const p = currentParams;

            if(currentStyle === 'chalkboard') {
                // Polvere di gesso
                for(let i=0; i<p.dust * 1500; i++) {
                    ctx.fillStyle = p.chalk + '08';
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
                }
                // Segni cancellino
                ctx.strokeStyle = p.chalk;
                ctx.globalAlpha = 0.03 * (p.wear / 50);
                for(let i=0; i<15; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*300, 0, Math.PI*2);
                    ctx.lineWidth = 100;
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
            }

            if(currentStyle === 'ricepaper') {
                ctx.strokeStyle = p.fiber;
                ctx.globalAlpha = 0.3;
                for(let i=0; i<p.density * 6; i++) {
                    ctx.beginPath();
                    let x = Math.random()*canvas.width;
                    let y = Math.random()*canvas.height;
                    ctx.moveTo(x, y);
                    ctx.bezierCurveTo(x+100, y-50, x-100, y+150, x+50, y+200);
                    ctx.lineWidth = Math.random()*2;
                    ctx.stroke();
                }
                // Grana puntinata
                ctx.globalAlpha = p.roughness / 300;
                for(let i=0; i<30000; i++) {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
                }
                ctx.globalAlpha = 1;
            }

            if(currentStyle === 'graffiti') {
                ctx.fillStyle = p.spray;
                ctx.font = "bold 400px 'Permanent Marker'";
                ctx.textAlign = "center";
                ctx.save();
                ctx.translate(canvas.width/2, canvas.height/2 + 100);
                ctx.rotate(-0.05);
                ctx.globalAlpha = 0.7;
                ctx.fillText(p.text, 0, 0);
                
                // Drips
                if(p.drips > 0) {
                    const dripsCount = Math.floor(p.text.length * 1.5);
                    for(let i=0; i<dripsCount; i++) {
                        let dx = (Math.random() - 0.5) * 800;
                        let h = Math.random() * p.drips * 4;
                        ctx.fillRect(dx, 10, 8, h);
                        ctx.beginPath();
                        ctx.arc(dx + 4, 10 + h, 4, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            if(currentStyle === 'notebook') {
                const space = parseInt(p.spacing);
                ctx.lineWidth = 1;
                ctx.strokeStyle = p.line;
                ctx.globalAlpha = 0.5;
                
                ctx.beginPath();
                for(let y=0; y<canvas.height; y+=space) {
                    ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
                }
                if(p.grid) {
                    for(let x=0; x<canvas.width; x+=space) {
                        ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
                    }
                }
                ctx.stroke();

                // Margine Rosso
                ctx.strokeStyle = p.margin;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(250, 0); ctx.lineTo(250, canvas.height);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            if(currentStyle === 'postcard') {
                // Vignettatura / Grunge
                const g = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 200, canvas.width/2, canvas.height/2, 1200);
                g.addColorStop(0, 'transparent');
                g.addColorStop(1, `rgba(50, 30, 0, ${p.grunge/200})`);
                ctx.fillStyle = g;
                ctx.fillRect(0,0, canvas.width, canvas.height);

                if(p.borders) {
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.lineWidth = 40;
                    ctx.strokeRect(0,0, canvas.width, canvas.height);
                }

                if(p.stamp) {
                    ctx.save();
                    ctx.translate(canvas.width - 300, 300);
                    ctx.rotate(0.2);
                    ctx.strokeStyle = '#4b362199';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(0, 0, 120, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.font = "bold 35px serif";
                    ctx.textAlign = "center";
                    ctx.strokeText("POSTE ITALIANE", 0, -20);
                    ctx.strokeText("AEREA", 0, 30);
                    ctx.restore();
                }
            }

            preview.style.backgroundImage = `url(${canvas.toDataURL()})`;
        }

        function randomize() {
            const controls = styles[currentStyle].controls;
            controls.forEach(c => {
                if(c.type === 'range') {
                    currentParams[c.id] = Math.floor(Math.random() * (c.max - c.min) + c.min);
                } else if(c.type === 'color') {
                    currentParams[c.id] = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                }
            });
            renderControls();
            draw();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = `bg-${currentStyle}-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        init();
    </script>
</body>
</html>
