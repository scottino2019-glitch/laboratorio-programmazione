<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 11 XL Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- DESIGN SISTEMA --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', 'Segoe UI Variable', sans-serif;
            background: url('https://images.wallpapersden.com/image/download/windows-11-stock-official_bWdpZ26UmZqaraWkpJRmbmdlrWZnZWU.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* GRIGLIA DESKTOP OTTIMIZZATA */
        #desktop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: calc(100% - 70px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 110px);
            grid-auto-flow: row; /* Cambiato per permettere lo scroll verticale se troppe app */
            gap: 15px;
            z-index: 5;
            overflow-y: auto; /* Permette di scorrere le icone su mobile */
        }

        .desktop-icon {
            width: 90px; height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; border-radius: 12px;
            transition: all 0.2s;
            user-select: none;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); }
        .icon-visual { font-size: 40px; margin-bottom: 5px; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); }
        .icon-label { color: white; font-size: 11px; font-weight: 500; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }

        /* TASKBAR */
        #taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px) saturate(180%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            z-index: 10000;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .start-btn { font-size: 35px; color: #0078d4; cursor: pointer; transition: transform 0.2s ease; }
        #clock { font-size: 1rem; font-weight: 600; color: #000; }

        /* MENU START */
        #start-menu {
            position: fixed;
            bottom: -1000px; 
            left: 50%;
            transform: translateX(-50%);
            width: 95%; /* Quasi tutta la larghezza su mobile */
            max-width: 600px; 
            max-height: 75vh; 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(35px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 9999;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #start-menu.open { bottom: 70px; }

        .start-content { flex: 1; overflow-y: auto; padding: 20px; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .app-item {
            padding: 15px; background: rgba(255, 255, 255, 0.7); border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600;
        }

        /* FINESTRE */
        .window {
            position: absolute;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s;
        }

        .window-header {
            padding: 10px 15px;
            background: #f3f3f3;
            cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 600; border-bottom: 1px solid #ddd;
        }

        .window-controls { display: flex; gap: 8px; }
        .control-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; }
        .close-btn:hover { background: #e81123; color: #fff; }

        .window-content { flex: 1; overflow: hidden; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }

        /* LOGICA MOBILE SPECIFICA */
        @media (max-width: 768px) {
            #taskbar { height: 55px; padding: 0 15px; }
            #clock { display: none; } /* Nasconde orologio su mobile per spazio */
            .app-grid { grid-template-columns: 1fr; } /* Una colonna nel menu start */
            
            /* Le finestre su mobile diventano full screen */
            .window { 
                top: 0 !important; 
                left: 0 !important; 
                width: 100% !important; 
                height: calc(100% - 55px) !important; 
                border-radius: 0; 
            }
            .window-header { padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="start-menu">
        <div class="start-content">
            <h2 style="text-align:center; margin-bottom:20px; font-size: 1.2rem;">Applicazioni</h2>
            <div class="app-grid" id="menu-grid"></div>
            <div style="margin-top: 25px; text-align: center; padding-bottom: 15px;">
                 <button onclick="location.reload()" style="padding: 10px 20px; border-radius: 8px; border:none; background:rgba(0,0,0,0.05); font-weight:bold;">🔄 Riavvia</button>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <div style="flex:1"></div>
        <div class="start-btn" onclick="toggleMenu(event)"><i class="fa-brands fa-windows"></i></div>
        <div style="flex:1; text-align:right;"><div id="clock">00:00</div></div>
    </div>

    <script>
        const desktopApps = [
            { name: 'Card Lab', icon: '🎴', file: 'cardLab.html' },
            { name: 'BG Creator', icon: '🖼️', file: 'backgroud-creator.html' },
            { name: 'Texture', icon: '📰', file: 'editor-texture.html' },
            { name: 'Hanzi Pro', icon: '㊗', file: 'hanziBuilderPro.html' },
            { name: 'BG Lab', icon: '🌄', file: 'backgroudlab.html' },
            { name: 'Card Orientali', icon: '🧧', file: 'generatore-card-orientali.html' },
            { name: 'Shape Lab', icon: '📐', file: 'shapeLab.html' },
            { name: 'JS Editor', icon: '💻', file: 'editor-js.html' },
            { name: 'JS Lab Soft', icon: '🌑', file: 'jsLab.html' },
            { name: 'Lab JS', icon: '🧪', file: 'lab-javascript.html' },
            { name: 'Storage', icon: '💾', file: 'lacalStorage.html' },
            { name: 'Lista', icon: '📋', file: 'lista.html' },
            { name: 'Logic Lab', icon: '🧠', file: 'logicLab.html' },
            { name: 'Web Lab', icon: '🌐', file: 'webLab.html' },
            { name: 'Web Lab2', icon: '🌝', file: 'webLab1.html' },
            { name: 'Esempi Html', icon: '🔯', file: 'editor+esempi.html' },
            { name: 'Esempi Tailwind', icon: '🪪', file: 'editor-tailwind.html' },
            { name: 'Lezioni Javascript', icon: '🚀', file: 'javascript.html' },
            { name: 'Lezioni html', icon: '🎓', file: 'htmlcss.html' },
            { name: 'Mini Siti', icon: '🌎', file: 'mini-generatore-siti.html' },
            { name: 'Kawaii', icon: '🐱', file: 'generatore-kawaii.html' },
            { name: 'Card Studio', icon: '🃏', file: 'https://card-studio-lovat.vercel.app/' },
        ];

        const menuApps = [
            { name: 'Portfolio', icon: '📂', file: 'portofolio.html' },
            { name: 'Note', icon: '📝', file: 'blocknote.html' },
            { name: 'Word', icon: '✍️', file: 'editor-testo.html' },
            { name: 'Html', icon: '🖍️', file: 'editor-html.html' },
            { name: 'Ide', icon: '💻', file: 'miniide.html' },
            { name: 'Immagini', icon: '🌐', file: 'https://photo-finder-kohl.vercel.app/'},
            { name: 'Gestione', icon: '⚙️', file: 'internal://settings' },
            { name: 'Web Designer', icon: '🌐', file: 'https://scottino2019-glitch.github.io/web-designer/' },
            { name: 'Pdf Studio', icon: '📄', file: 'https://pdf-studio-editor.vercel.app/'},
            { name: 'Giochi', icon: '🎮', file: 'https://windows-game.vercel.app/'},
            { name: 'ShapeLab', icon: '🎨', file: 'https://shapelabstudio.netlify.app/'}
        ];

        let zIndex = 1000;
        const desk = document.getElementById('desktop');
        const startMenu = document.getElementById('start-menu');
        const menuGrid = document.getElementById('menu-grid');

        // Render icone desktop
        desktopApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.innerHTML = `<div class="icon-visual">${app.icon}</div><div class="icon-label">${app.name}</div>`;
            div.onclick = () => openApp(app);
            desk.appendChild(div);
        });

        // Render app menu start
        menuApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<span>${app.icon}</span> ${app.name}`;
            div.onclick = () => openApp(app);
            menuGrid.appendChild(div);
        });

        function toggleMenu(e) { e.stopPropagation(); startMenu.classList.toggle('open'); }

        function openApp(app) {
            startMenu.classList.remove('open');
            const win = document.createElement('div');
            win.className = 'window';
            win.style.zIndex = zIndex++;

            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                // Desktop: Finestre grandi al 90%
                win.style.width = '90%'; win.style.height = '82%';
                const count = document.querySelectorAll('.window').length;
                win.style.left = (4 + (count * 2)) + '%';
                win.style.top = (2 + (count * 2)) + '%';
            }

            const isInternal = app.file.startsWith('internal://');

            win.innerHTML = `
                <div class="window-header">
                    <span>${app.icon} ${app.name}</span>
                    <div class="window-controls">
                        ${!isMobile ? `<span class="control-btn" onclick="this.closest('.window').classList.toggle('maximized')">🔳</span>` : ''}
                        <span class="control-btn close-btn" onclick="this.closest('.window').remove()">✕</span>
                    </div>
                </div>
                <div class="window-content">
                    ${isInternal ? renderInternal(app.file) : `<iframe src="${app.file}"></iframe>`}
                </div>
            `;

            win.onmousedown = () => { win.style.zIndex = zIndex++; };
            document.body.appendChild(win);
            if (!isMobile) setupDraggable(win);
        }

        function setupDraggable(win) {
            const header = win.querySelector('.window-header');
            let x = 0, y = 0, nx = 0, ny = 0;
            header.onmousedown = (e) => {
                if(win.classList.contains('maximized')) return;
                nx = e.clientX; ny = e.clientY;
                document.onmousemove = (e) => {
                    x = nx - e.clientX; y = ny - e.clientY;
                    nx = e.clientX; ny = e.clientY;
                    win.style.top = (win.offsetTop - y) + "px";
                    win.style.left = (win.offsetLeft - x) + "px";
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
        }

        function renderInternal(path) {
            if (path === 'internal://settings') {
                return `<div style="padding:20px;"><h3>⚙️ Impostazioni</h3><p>Versione Sistema: 2.1 Mobile Ready</p><button onclick="localStorage.clear();location.reload();" style="margin-top:10px; padding:10px; background:red; color:white; border:none; border-radius:5px;">Reset Sistema</button></div>`;
            }
            return 'App non trovata';
        }

        document.onclick = (e) => { if(!e.target.closest('#start-menu') && !e.target.closest('.start-btn')) startMenu.classList.remove('open'); };

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
