<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 XL Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STILE ORIGINALE XL --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://images.wallpapersden.com/image/download/windows-11-stock-official_bWdpZ26UmZqaraWkpJRmbmdlrWZnZWU.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* GRIGLIA DESKTOP */
        #desktop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: calc(100% - 75px);
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 110px);
            grid-template-rows: repeat(auto-fill, 120px);
            grid-auto-flow: column;
            gap: 20px;
            z-index: 5;
        }

        .desktop-icon {
            width: 100px; height: 110px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; border-radius: 12px;
            transition: 0.2s;
            user-select: none;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); }
        .icon-visual { font-size: 45px; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .icon-label { color: white; font-size: 12px; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* TASKBAR XL */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px; 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10000;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .start-btn { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 45px; color: #0078d4; }
        .start-btn:hover { transform: scale(1.1); }
        #clock { font-size: 1.4rem; font-weight: bold; color: #000; text-shadow: 0 0 10px rgba(255,255,255,0.4); }

        /* MENU START */
        #start-menu {
            position: fixed;
            bottom: -900px; 
            left: 50%;
            transform: translateX(-50%);
            width: 600px; 
            height: 520px; 
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 15px 60px rgba(0,0,0,0.4);
            transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 9999;
        }
        #start-menu.open { bottom: 90px; }
        #start-menu h2 { font-size: 1.5rem; margin-bottom: 25px; color: #333; text-align: center; font-weight: 700; }

        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .app-item {
            padding: 18px;
            background: #fff;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
        }
        .app-item:hover { background: #f0f7ff; border-color: #0078d4; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* FINESTRE */
        .window {
            position: absolute;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 70px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 450px;
            min-height: 350px;
            z-index: 1000;
        }

        .window-header {
            padding: 12px 20px;
            background: #f8f8f8;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            border-bottom: 1px solid #eee;
            user-select: none;
        }

        .close-btn { 
            color: #ff5f56; 
            cursor: pointer; 
            font-size: 22px; 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }
        .close-btn:hover { background: rgba(255, 95, 86, 0.1); }
        .window-content { flex: 1; background: #fff; }
        iframe { width: 100%; height: 100%; border: none; }
        /* --- AGGIUNTA PER MOBILE --- */
@media (max-width: 768px) {
    .window { 
        top: 0 !important; 
        left: 0 !important; 
        width: 100% !important; 
        height: calc(100% - 60px) !important; /* Sottrae lo spazio della taskbar */
        border-radius: 0 !important; 
    }
    
    #desktop {
        grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
        grid-auto-rows: 110px;
        overflow-y: auto;
    }
}
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="start-menu">
        <h2>App di Sistema & Utility</h2>
        <div class="app-grid" id="menu-grid"></div>
        <div style="margin-top: 30px; text-align: center;">
             <button onclick="location.reload()" style="padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; background: #f5f5f5; font-weight: bold; transition: 0.2s;">🔄 Riavvia Sistema</button>
        </div>
    </div>

    <div id="taskbar">
        <div style="flex:1"></div>
        <div class="start-btn" onclick="toggleMenu(event)">
            <i class="fa-brands fa-windows"></i>
        </div>
        <div style="flex:1; text-align:right;">
            <div id="clock">00:00</div>
        </div>
    </div>

    <script>
        // LE TUE APP DESKTOP
        const desktopApps = [
            { name: 'Card Lab', icon: '🎴', file: 'cardLab.html' },
            { name: 'BG Creator', icon: '🖼️', file: 'backgroud-creator.html' },
            { name: 'Texture', icon: '📰', file: 'editor-texture.html' },
            { name: 'Shape Lab', icon: '📐', file: 'shapeLab.html' },
            { name: 'JS Editor', icon: '💻', file: 'editor-js.html' },
            { name: 'JS Lab Soft', icon: '🌑', file: 'jsLab.html' },
            { name: 'Lab JS', icon: '🧪', file: 'lab-javascript.html' },
            { name: 'Storage', icon: '💾', file: 'lacalStorage.html' },
            { name: 'Lista', icon: '📋', file: 'lista.html' },
            { name: 'Logic Lab', icon: '🧠', file: 'logicLab.html' },
            { name: 'Web Lab', icon: '🌐', file: 'webLab.html' },
            { name: 'Web Lab2', icon: '🌝', file: 'webLab1.html' },
            { name: 'Esempi Html', icon: '🔯', file: 'editor+esempi.html' },
            { name: 'Esempi Tailwind', icon: '🪪', file: 'editor-tailwind.html' }
        ];

        // LE TUE APP MENU START
        const menuApps = [
            { name: 'Portofolio', icon: '📂', file: 'portofolio.html' },
            { name: 'Note', icon: '📝', file: 'blocknote.html' },
            { name: 'Word', icon: '✍️', file: 'editor-testo.html' },
            { name: 'Html', icon: '🖍️', file: 'editor-html.html' },
            { name: 'Web Designer', icon: '🌐', file: 'https://scottino2019-glitch.github.io/web-designer/' },
            { name: 'Animation builder', icon: '🌐', file: 'https://animation-builder-sooty.vercel.app/' },
            { name: 'Card Generator', icon: '🌐', file: 'https://card-generetor.vercel.app/' },
        ];

        let zIndex = 1000;
        const desk = document.getElementById('desktop');
        const startMenu = document.getElementById('start-menu');
        const menuGrid = document.getElementById('menu-grid');

        // Renderizza Icone Desktop
        desktopApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.innerHTML = `<div class="icon-visual">${app.icon}</div><div class="icon-label">${app.name}</div>`;
            div.onclick = () => openApp(app);
            desk.appendChild(div);
        });

        // Renderizza Voci Menu Start
        menuApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<span>${app.icon}</span> ${app.name}`;
            div.onclick = () => openApp(app);
            menuGrid.appendChild(div);
        });

        function toggleMenu(e) {
            e.stopPropagation();
            startMenu.classList.toggle('open');
        }

        function openApp(app) {
    startMenu.classList.remove('open');
    const win = document.createElement('div');
    win.className = 'window';
    
    // Controlla se è mobile
    const isMobile = window.innerWidth <= 768;
    
    if (!isMobile) {
        // Applica dimensioni e cascata solo su Desktop
        win.style.width = '75%';
        win.style.height = '70%';
        const count = document.querySelectorAll('.window').length;
        win.style.left = (60 + (count * 20)) + 'px';
        win.style.top = (40 + (count * 20)) + 'px';
    }
    
    win.style.zIndex = zIndex++;
    win.innerHTML = `
        <div class="window-header">
            <span>${app.icon} ${app.name}</span>
            <span class="close-btn" onclick="this.closest('.window').remove()">✕</span>
        </div>
        <div class="window-content">
            <iframe src="${app.file}"></iframe>
        </div>
    `;

    win.onmousedown = () => { win.style.zIndex = zIndex++; };
    document.body.appendChild(win);
    
    // Attiva il trascinamento SOLO se non è mobile
    if (!isMobile) {
        setupDraggable(win);
    }
}
            
            // Posizionamento a cascata intelligente
            const count = document.querySelectorAll('.window').length;
            win.style.left = (60 + (count * 25)) + 'px';
            win.style.top = (40 + (count * 25)) + 'px';
            win.style.zIndex = zIndex++;

            win.innerHTML = `
                <div class="window-header">
                    <span>${app.icon} ${app.name}</span>
                    <span class="close-btn" onclick="this.closest('.window').remove()">✕</span>
                </div>
                <div class="window-content">
                    <iframe src="${app.file}"></iframe>
                </div>
            `;

            win.onmousedown = () => { win.style.zIndex = zIndex++; };
            document.body.appendChild(win);
            setupDraggable(win);
        }

        function setupDraggable(win) {
            const header = win.querySelector('.window-header');
            let x = 0, y = 0, nx = 0, ny = 0;
            header.onmousedown = (e) => {
                nx = e.clientX;
                ny = e.clientY;
                document.onmousemove = (e) => {
                    x = nx - e.clientX;
                    y = ny - e.clientY;
                    nx = e.clientX;
                    ny = e.clientY;
                    win.style.top = (win.offsetTop - y) + "px";
                    win.style.left = (win.offsetLeft - x) + "px";
                };
                document.onmouseup = () => {
                    document.onmousemove = null;
                };
            };
        }

        // Click fuori per chiudere il menu
        document.onclick = (e) => {
            if(!e.target.closest('#start-menu') && !e.target.closest('.start-btn')) {
                startMenu.classList.remove('open');
            }
        };

        // Orologio
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
