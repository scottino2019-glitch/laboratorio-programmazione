<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 11 XL Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STILE BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://images.wallpapersden.com/image/download/windows-11-stock-official_bWdpZ26UmZqaraWkpJRmbmdlrWZnZWU.jpg') no-repeat center center fixed;
            background-size: cover;
            transition: background 0.5s ease;
        }

        /* GRIGLIA DESKTOP */
        #desktop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: calc(100% - 70px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 110px);
            grid-auto-flow: column;
            gap: 15px;
            z-index: 5;
            overflow: hidden;
        }

        .desktop-icon {
            width: 95px; height: 105px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; border-radius: 10px;
            transition: 0.2s;
            user-select: none;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); }
        .icon-visual { font-size: 40px; margin-bottom: 5px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .icon-label { color: white; font-size: 11px; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

        /* TASKBAR */
        #taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70px; 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            z-index: 10000;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .start-btn { font-size: 40px; color: #0078d4; cursor: pointer; transition: 0.2s; }
        .start-btn:hover { transform: scale(1.1); }
        #clock { font-size: 1.2rem; font-weight: bold; color: #000; }

        /* MENU START */
        #start-menu {
            position: fixed;
            bottom: -900px; 
            left: 50%;
            transform: translateX(-50%);
            width: 600px; 
            height: 520px; 
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(40px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.4);
            transition: bottom 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 9999;
        }
        #start-menu.open { bottom: 85px; }

        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .app-item {
            padding: 15px; background: #fff; border-radius: 12px;
            cursor: pointer; border: 1px solid rgba(0,0,0,0.06);
            display: flex; align-items: center; gap: 12px; font-weight: 600;
            transition: 0.2s;
        }
        .app-item:hover { background: #f0f7ff; border-color: #0078d4; }

        /* FINESTRE */
        .window {
            position: absolute;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }

        .window-header {
            padding: 10px 15px;
            background: #f3f3f3;
            cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold; border-bottom: 1px solid #ddd;
        }

        .close-btn { color: #ff5f56; font-size: 20px; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .window-content { flex: 1; overflow: auto; padding: 15px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* UTILITY SETTINGS */
        .settings-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        .settings-btn { padding: 8px 15px; border-radius: 5px; border: none; background: #0078d4; color: white; cursor: pointer; margin-top: 10px; }
        .settings-btn.danger { background: #d83b01; }

        @media (max-width: 768px) {
            #desktop { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); grid-auto-flow: row; height: calc(100% - 60px); overflow-y: auto; }
            #taskbar { height: 60px; }
            #start-menu { width: 95%; height: 80vh; border-radius: 20px 20px 0 0; }
            #start-menu.open { bottom: 60px; }
            .app-grid { grid-template-columns: 1fr; }
            .window { top: 0 !important; left: 0 !important; width: 100% !important; height: calc(100% - 60px) !important; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="start-menu">
        <h2 style="text-align:center; margin-bottom:20px;">Menu Start</h2>
        <div class="app-grid" id="menu-grid"></div>
        <div style="margin-top: 20px; text-align: center;">
             <button onclick="location.reload()" style="padding: 10px 20px; border-radius: 8px; border:none; background:#eee; font-weight:bold; cursor:pointer;">🔄 Riavvia PC</button>
        </div>
    </div>

    <div id="taskbar">
        <div style="flex:1"></div>
        <div class="start-btn" onclick="toggleMenu(event)"><i class="fa-brands fa-windows"></i></div>
        <div style="flex:1; text-align:right;"><div id="clock">00:00</div></div>
    </div>

    <script>
        // LE TUE APP DESKTOP
        const desktopApps = [
            { name: 'Card Lab', icon: '🎴', file: 'cardLab.html' },
            { name: 'BG Creator', icon: '🖼️', file: 'backgroud-creator.html' },
            { name: 'Texture', icon: '📰', file: 'editor-texture.html' },
            { name: 'Shape Lab', icon: '📐', file: 'shapeLab.html' },
            { name: 'JS Editor', icon: '💻', file: 'editor-js.html' },
            { name: 'JS Lab Soft', icon: '🌑', file: 'jsLab.html' },
            { name: 'Lab JS', icon: '🧪', file: 'lab-javascript.html' },
            { name: 'Storage', icon: '💾', file: 'lacalStorage.html' },
            { name: 'Lista', icon: '📋', file: 'lista.html' },
            { name: 'Logic Lab', icon: '🧠', file: 'logicLab.html' },
            { name: 'Web Lab', icon: '🌐', file: 'webLab.html' },
            { name: 'Web Lab2', icon: '🌝', file: 'webLab1.html' },
            { name: 'Esempi Html', icon: '🔯', file: 'editor+esempi.html' },
            { name: 'Esempi Tailwind', icon: '🪪', file: 'editor-tailwind.html' }
        ];

        // LE TUE APP MENU START (Aggiunta Gestione Sistema)
        const menuApps = [
             { name: 'Portofolio', icon: '📂', file: 'portofolio.html' },
            { name: 'Note', icon: '📝', file: 'blocknote.html' },
            { name: 'Word', icon: '✍️', file: 'editor-testo.html' },
            { name: 'Html', icon: '🖍️', file: 'editor-html.html' },
            { name: 'Gestione Sistema', icon: '⚙️', file: 'internal://settings' },
            { name: 'Web Designer', icon: '🌐', file: 'https://scottino2019-glitch.github.io/web-designer/' },
            { name: 'Animation builder', icon: '🌐', file: 'https://animation-builder-sooty.vercel.app/' },
            { name: 'Card Generator', icon: '🌐', file: 'https://card-generetor.vercel.app/' },
            { name: 'Immagini', icon: '🌐', file: 'https://photo-finder-kohl.vercel.app/' }
            ];

        let zIndex = 1000;
        const desk = document.getElementById('desktop');
        const startMenu = document.getElementById('start-menu');
        const menuGrid = document.getElementById('menu-grid');

        desktopApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.innerHTML = `<div class="icon-visual">${app.icon}</div><div class="icon-label">${app.name}</div>`;
            div.onclick = () => openApp(app);
            desk.appendChild(div);
        });

        menuApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<span>${app.icon}</span> ${app.name}`;
            div.onclick = () => openApp(app);
            menuGrid.appendChild(div);
        });

        function toggleMenu(e) { e.stopPropagation(); startMenu.classList.toggle('open'); }

        function openApp(app) {
            startMenu.classList.remove('open');
            const win = document.createElement('div');
            win.className = 'window';
            
            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                win.style.width = '75%';
                win.style.height = '70%';
                const count = document.querySelectorAll('.window').length;
                win.style.left = (60 + (count * 20)) + 'px';
                win.style.top = (40 + (count * 20)) + 'px';
            }
            
            win.style.zIndex = zIndex++;
            const isInternal = app.file.startsWith('internal://');
            
            win.innerHTML = `
                <div class="window-header">
                    <span>${app.icon} ${app.name}</span>
                    <span class="close-btn" onclick="this.closest('.window').remove()">✕</span>
                </div>
                <div class="window-content">
                    ${isInternal ? renderInternalApp(app.file) : `<iframe src="${app.file}"></iframe>`}
                </div>
            `;

            win.onmousedown = () => { win.style.zIndex = zIndex++; };
            document.body.appendChild(win);
            if (!isMobile) setupDraggable(win);
        }

        function renderInternalApp(path) {
            if (path === 'internal://settings') {
                const size = JSON.stringify(localStorage).length;
                const kb = (size / 1024).toFixed(2);
                return `
                    <div style="padding:10px;">
                        <h3>Impostazioni Sistema</h3>
                        <div class="settings-card">
                            <strong>📦 Memoria LocalStorage</strong><br>
                            Spazio occupato: ${kb} KB / 5000 KB<br>
                            <button class="settings-btn danger" onclick="clearStorage()">Svuota Memoria</button>
                        </div>
                        <div class="settings-card">
                            <strong>🖼️ Sfondo Desktop</strong><br>
                            Inserisci URL immagine:<br>
                            <input type="text" id="bg-url" style="width:100%; padding:5px; margin-top:5px;" placeholder="https://...">
                            <button class="settings-btn" onclick="changeBg()">Applica Sfondo</button>
                        </div>
                    </div>
                `;
            }
            return 'App non trovata';
        }

        // Funzioni Globali per Settings
        window.clearStorage = () => {
            if(confirm("Sei sicuro? Perderai tutti i dati salvati nei laboratori!")) {
                localStorage.clear();
                location.reload();
            }
        };

        window.changeBg = () => {
            const url = document.getElementById('bg-url').value;
            if(url) {
                document.body.style.backgroundImage = `url('${url}')`;
                localStorage.setItem('win_custom_bg', url);
            }
        };

        // Carica sfondo salvato
        const savedBg = localStorage.getItem('win_custom_bg');
        if(savedBg) document.body.style.backgroundImage = `url('${savedBg}')`;

        function setupDraggable(win) {
            const header = win.querySelector('.window-header');
            let x = 0, y = 0, nx = 0, ny = 0;
            header.onmousedown = (e) => {
                nx = e.clientX; ny = e.clientY;
                document.onmousemove = (e) => {
                    x = nx - e.clientX; y = ny - e.clientY;
                    nx = e.clientX; ny = e.clientY;
                    win.style.top = (win.offsetTop - y) + "px";
                    win.style.left = (win.offsetLeft - x) + "px";
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
        }

        document.onclick = (e) => {
            if(!e.target.closest('#start-menu') && !e.target.closest('.start-btn')) {
                startMenu.classList.remove('open');
            }
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
