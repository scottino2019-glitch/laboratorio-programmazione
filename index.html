<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows 11 XL Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- DESIGN SISTEMA (ORIGINALE RIPRISTINATO) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', 'Segoe UI Variable', sans-serif;
            background: url('https://images.wallpapersden.com/image/download/windows-11-stock-official_bWdpZ26UmZqaraWkpJRmbmdlrWZnZWU.jpg') no-repeat center center fixed;
            background-size: cover;
            transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #desktop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: calc(100% - 70px);
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 105px);
            grid-template-rows: repeat(auto-fill, 115px);
            grid-auto-flow: column;
            gap: 15px;
            z-index: 5;
        }

        .desktop-icon {
            width: 100px; height: 110px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; cursor: pointer; border-radius: 12px;
            transition: all 0.2s;
            user-select: none;
        }
        .desktop-icon:hover { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px); }
        .icon-visual { font-size: 42px; margin-bottom: 8px; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); }
        .icon-label { color: white; font-size: 11.5px; font-weight: 500; text-shadow: 1px 1px 4px rgba(0,0,0,0.9); }

        #taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70px; 
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(25px) saturate(180%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
            z-index: 10000;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .start-btn { font-size: 42px; color: #0078d4; cursor: pointer; transition: transform 0.2s ease; }
        .start-btn:hover { transform: scale(1.1); }
        #clock { font-size: 1.25rem; font-weight: 600; color: #000; }

        #start-menu {
            position: fixed;
            bottom: -1000px; 
            left: 50%;
            transform: translateX(-50%);
            width: 600px; 
            max-height: 80vh; 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(35px) saturate(150%);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            z-index: 9999;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #start-menu.open { bottom: 85px; }

        .start-content { flex: 1; overflow-y: auto; padding: 25px 30px 30px 30px; }
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .app-item {
            padding: 18px; background: rgba(255, 255, 255, 0.6); border-radius: 15px;
            cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex; align-items: center; gap: 15px; font-weight: 600;
            transition: all 0.2s;
        }
        .app-item:hover { background: #fff; transform: translateY(-2px); }

        /* --- FINESTRE (OTTIMIZZATE MA STILE ORIGINALE) --- */
        .window {
            position: absolute;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.35);
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            /* Dimensione iniziale ottimizzata */
            width: 90%; 
            height: 80%;
        }

        .window-header {
            padding: 12px 20px;
            background: #f8f8f8;
            cursor: move;
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 700; border-bottom: 1px solid #eee;
            user-select: none;
        }

        .close-btn { color: #ff5f56; font-size: 22px; cursor: pointer; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }

        .window-content { flex: 1; position: relative; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        /* --- LOGICA MOBILE (ADATTAMENTO FRAME) --- */
        @media (max-width: 768px) {
            .window { 
                top: 0 !important; 
                left: 0 !important; 
                width: 100% !important; 
                height: calc(100% - 70px) !important; 
                border-radius: 0;
            }
            #start-menu { width: 100%; border-radius: 25px 25px 0 0; bottom: -100%; }
            #start-menu.open { bottom: 70px; }
            .app-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="desktop"></div>

    <div id="start-menu">
        <div class="start-content">
            <h2 style="text-align:center; margin-bottom:25px;">Menu Start</h2>
            <div class="app-grid" id="menu-grid"></div>
            <div style="margin-top: 35px; text-align: center; padding-bottom: 20px;">
                 <button onclick="location.reload()" style="padding: 12px 25px; border-radius: 10px; border:none; background:rgba(0,0,0,0.05); font-weight:bold; cursor:pointer;">🔄 Riavvia PC</button>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <div style="flex:1"></div>
        <div class="start-btn" onclick="toggleMenu(event)"><i class="fa-brands fa-windows"></i></div>
        <div style="flex:1; text-align:right;"><div id="clock">00:00</div></div>
    </div>

    <script>
        // Liste App (Inalterate)
        const desktopApps = [
            { name: 'Card Lab', icon: '🎴', file: 'cardLab.html' },
            { name: 'BG Creator', icon: '🖼️', file: 'backgroud-creator.html' },
            { name: 'Texture', icon: '📰', file: 'editor-texture.html' },
            { name: 'Hanzi Pro', icon: '㊗', file: 'hanziBuilderPro.html' },
            { name: 'BG Lab', icon: '🌄', file: 'backgroudlab.html' },
            { name: 'Card Orientali', icon: '🧧', file: 'generatore-card-orientali.html' },
            { name: 'Shape Lab', icon: '📐', file: 'shapeLab.html' },
            { name: 'JS Editor', icon: '💻', file: 'editor-js.html' },
            { name: 'JS Lab Soft', icon: '🌑', file: 'jsLab.html' },
            { name: 'Lab JS', icon: '🧪', file: 'lab-javascript.html' },
            { name: 'Storage', icon: '💾', file: 'lacalStorage.html' },
            { name: 'Lista', icon: '📋', file: 'lista.html' },
            { name: 'Logic Lab', icon: '🧠', file: 'logicLab.html' },
            { name: 'Web Lab', icon: '🌐', file: 'webLab.html' },
            { name: 'Web Lab2', icon: '🌝', file: 'webLab1.html' },
            { name: 'Esempi Html', icon: '🔯', file: 'editor+esempi.html' },
            { name: 'Esempi Tailwind', icon: '🪪', file: 'editor-tailwind.html' },
            { name: 'Lezioni Javascript', icon: '🚀', file: 'javascript.html' },
            { name: 'Lezioni html', icon: '🎓', file: 'htmlcss.html' },
            { name: 'Mini Siti', icon: '🌎', file: 'mini-generatore-siti.html' },
            { name: 'Kawaii', icon: '🐱', file: 'generatore-kawaii.html' },
            { name: 'Card Studio', icon: '🃏', file: 'https://card-studio-lovat.vercel.app/' },
        ];

        const menuApps = [
            { name: 'Portofolio', icon: '📂', file: 'portofolio.html' },
            { name: 'Note', icon: '📝', file: 'blocknote.html' },
            { name: 'Word', icon: '✍️', file: 'editor-testo.html' },
            { name: 'Html', icon: '🖍️', file: 'editor-html.html' },
            { name: 'Ide', icon: '💻', file: 'miniide.html' },
            { name: 'Gestione Sistema', icon: '⚙️', file: 'internal://settings' },
            { name: 'Web Designer', icon: '🌐', file: 'https://scottino2019-glitch.github.io/web-designer/' },
            { name: 'Animation builder', icon: '🌐', file: 'https://animation-builder-sooty.vercel.app/' },
            { name: 'Card Generator', icon: '🌐', file: 'https://card-generetor.vercel.app/' },
            { name: 'Immagini', icon: '🌐', file: 'https://photo-finder-kohl.vercel.app/'},
            { name: 'Pdf', icon: '🌐', file: 'https://pdf-studio-editor.vercel.app/'},
            { name: 'Giochi', icon: '🌐', file: 'https://windows-game.vercel.app/'},
            { name: 'Javascript', icon: '🌐', file: 'https://javascriptmasterclassinterattiva.netlify.app/'},
            { name: 'ShapeLab', icon: '🌐', file: 'https://shapelabstudio.netlify.app/'}
        ];

        let zIndex = 1000;
        const desk = document.getElementById('desktop');
        const startMenu = document.getElementById('start-menu');
        const menuGrid = document.getElementById('menu-grid');

        // Generazione icone (Inalterata)
        desktopApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.innerHTML = `<div class="icon-visual">${app.icon}</div><div class="icon-label">${app.name}</div>`;
            div.onclick = () => openApp(app);
            desk.appendChild(div);
        });

        menuApps.forEach(app => {
            const div = document.createElement('div');
            div.className = 'app-item';
            div.innerHTML = `<span>${app.icon}</span> ${app.name}`;
            div.onclick = () => openApp(app);
            menuGrid.appendChild(div);
        });

        function toggleMenu(e) { e.stopPropagation(); startMenu.classList.toggle('open'); }

        // --- APERTURA APP OTTIMIZZATA ---
        function openApp(app) {
            startMenu.classList.remove('open');
            const win = document.createElement('div');
            win.className = 'window';

            const isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                // Imposta una dimensione generosa ma lascia vedere il desktop ai bordi
                win.style.width = '85%';
                win.style.height = '80%';
                const count = document.querySelectorAll('.window').length;
                // Posizionamento a cascata
                win.style.left = (5 + (count * 2)) + '%';
                win.style.top = (5 + (count * 2)) + '%';
            }

            win.style.zIndex = zIndex++;
            const isInternal = app.file.startsWith('internal://');

            win.innerHTML = `
                <div class="window-header" onmousedown="bringToFront(this.closest('.window'))">
                    <span>${app.icon} ${app.name}</span>
                    <span class="close-btn" onclick="this.closest('.window').remove()">✕</span>
                </div>
                <div class="window-content">
                    ${isInternal ? renderInternal(app.file) : `<iframe src="${app.file}"></iframe>`}
                </div>
            `;

            // Porta in primo piano al click
            win.onmousedown = () => { bringToFront(win); };
            document.body.appendChild(win);
            if (!isMobile) setupDraggable(win);
        }

        function bringToFront(win) {
            zIndex++;
            win.style.zIndex = zIndex;
        }

        function setupDraggable(win) {
            const header = win.querySelector('.window-header');
            let x = 0, y = 0, nx = 0, ny = 0;
            header.onmousedown = (e) => {
                bringToFront(win);
                nx = e.clientX; ny = e.clientY;
                document.onmousemove = (e) => {
                    x = nx - e.clientX; y = ny - e.clientY;
                    nx = e.clientX; ny = e.clientY;
                    win.style.top = (win.offsetTop - y) + "px";
                    win.style.left = (win.offsetLeft - x) + "px";
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
        }

        function renderInternal(path) {
            if (path === 'internal://settings') {
                return `<div style="padding:20px;"><h3>⚙️ Impostazioni Sistema</h3><p>Ottimizzazione Frame Attiva.</p></div>`;
            }
            return 'App non trovata';
        }

        document.onclick = (e) => { if(!e.target.closest('#start-menu') && !e.target.closest('.start-btn')) startMenu.classList.remove('open'); };

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
