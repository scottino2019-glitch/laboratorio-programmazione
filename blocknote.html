<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocco Note - Windows Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --win-bg: #ffffff;
            --win-hover: #e5f3ff;
            --win-border: #d1d1d1;
            --win-menu-text: #000000;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--win-bg);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Menu Bar */
        .menu-bar {
            background-color: var(--win-bg);
            display: flex;
            padding: 2px 4px;
            font-size: 12px;
            border-bottom: 1px solid var(--win-border);
            user-select: none;
            z-index: 50;
        }

        .menu-item {
            padding: 4px 8px;
            position: relative;
            cursor: default;
        }

        .menu-item:hover {
            background-color: var(--win-hover);
        }

        /* Dropdown */
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #f2f2f2;
            min-width: 200px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
            border: 1px solid #ccc;
            padding: 3px;
            z-index: 100;
        }

        .menu-item:hover .dropdown {
            display: block;
        }

        .dropdown-item {
            padding: 6px 10px 6px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #333;
        }

        .dropdown-item:hover {
            background-color: #0078d7;
            color: white;
        }

        .dropdown-item span {
            font-size: 11px;
            opacity: 0.7;
        }

        .divider {
            height: 1px;
            background-color: #ccc;
            margin: 4px 5px;
        }

        /* Text Area */
        #editor {
            flex-grow: 1;
            width: 100%;
            border: none;
            outline: none;
            padding: 8px;
            font-family: 'Consolas', 'Lucida Console', monospace;
            font-size: 14px;
            resize: none;
            line-height: 1.5;
            color: #1e1e1e;
        }

        /* Status Bar */
        .status-bar {
            height: 22px;
            background-color: #f0f0f0;
            border-top: 1px solid var(--win-border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-size: 11px;
            color: #444;
            padding: 0 15px;
            gap: 20px;
        }

        /* Overlay per "Esci" */
        #exit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0078d7;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .win-button {
            background: #e1e1e1;
            color: black;
            border: 1px solid #adadad;
            padding: 5px 20px;
            margin-top: 20px;
            cursor: pointer;
        }

        .win-button:hover {
            background: #e5f1fb;
            border-color: #0078d7;
        }
    </style>
</head>
<body>

    <div id="exit-overlay">
        <h1 class="text-4xl mb-4">Chiusura sessione in corso...</h1>
        <p>Il Blocco Note è stato chiuso virtualmente.</p>
        <button class="win-button" onclick="cancelExit()">Riapri Blocco Note</button>
    </div>

    <div class="app-container" id="main-app">
        <!-- Menu Bar -->
        <div class="menu-bar">
            <div class="menu-item">
                File
                <div class="dropdown">
                    <div class="dropdown-item" onclick="newFile()">Nuovo <span>Ctrl+N</span></div>
                    <div class="dropdown-item" onclick="triggerOpen()">Apri... <span>Ctrl+O</span></div>
                    <div class="dropdown-item" onclick="saveFile()">Salva <span>Ctrl+S</span></div>
                    <div class="divider"></div>
                    <div class="dropdown-item" onclick="exitApp()">Esci</div>
                </div>
            </div>
            <div class="menu-item">
                Modifica
                <div class="dropdown">
                    <div class="dropdown-item" onclick="document.execCommand('undo')">Annulla <span>Ctrl+Z</span></div>
                    <div class="divider"></div>
                    <div class="dropdown-item" onclick="cutText()">Taglia <span>Ctrl+X</span></div>
                    <div class="dropdown-item" onclick="copyText()">Copia <span>Ctrl+C</span></div>
                    <div class="dropdown-item" onclick="pasteInfo()">Incolla <span>Ctrl+V</span></div>
                </div>
            </div>
            <div class="menu-item">
                Visualizza
                <div class="dropdown">
                    <div class="dropdown-item" onclick="toggleStatusBar()">Barra di stato</div>
                </div>
            </div>
        </div>

        <input type="file" id="fileLoader" hidden accept=".txt">

        <!-- Editor -->
        <textarea id="editor" spellcheck="false"></textarea>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <div id="cursorPos">Ln 1, Col 1</div>
            <div>Windows (CRLF)</div>
            <div>UTF-8</div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const statusBar = document.getElementById('statusBar');
        const fileLoader = document.getElementById('fileLoader');
        const cursorPos = document.getElementById('cursorPos');
        const exitOverlay = document.getElementById('exit-overlay');

        // Aggiorna posizione cursore
        function updateStatus() {
            const text = editor.value;
            const sub = text.substring(0, editor.selectionStart);
            const lines = sub.split('\n');
            const line = lines.length;
            const col = lines[lines.length - 1].length + 1;
            cursorPos.innerText = `Ln ${line}, Col ${col}`;
        }

        editor.addEventListener('input', updateStatus);
        editor.addEventListener('click', updateStatus);
        editor.addEventListener('keyup', updateStatus);

        // Operazioni File
        function newFile() {
            if (editor.value && !confirm("Vuoi scartare le modifiche correnti?")) return;
            editor.value = '';
            updateStatus();
        }

        function triggerOpen() {
            fileLoader.click();
        }

        fileLoader.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                editor.value = e.target.result;
                updateStatus();
            };
            reader.readAsText(file);
        };

        function saveFile() {
            const blob = new Blob([editor.value], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Documento.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Funzione Esci
        function exitApp() {
            if (editor.value && !confirm("Contenuto non salvato. Vuoi uscire comunque?")) return;
            exitOverlay.style.display = 'flex';
        }

        function cancelExit() {
            exitOverlay.style.display = 'none';
        }

        // Modifica
        function cutText() { document.execCommand('cut'); }
        function copyText() { document.execCommand('copy'); }
        function pasteInfo() { 
            alert("Per incollare, usa la scorciatoia da tastiera Ctrl + V."); 
        }

        function toggleStatusBar() {
            statusBar.style.display = statusBar.style.display === 'none' ? 'flex' : 'none';
        }
