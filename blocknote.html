 <head>

  <style>
    body {
      box-sizing: border-box;
    }
    
    .notebook-paper {
      background-color: #fefef8;
      background-image: 
        linear-gradient(#c8e0f4 1px, transparent 1px),
        linear-gradient(90deg, #c8e0f4 1px, transparent 1px);
      background-size: 20px 20px;
      position: relative;
    }
    
    .notebook-paper::before {
      content: '';
      position: absolute;
      left: 50px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, #ff9999 0%, #ff6666 50%, #ff9999 100%);
      opacity: 0.7;
    }
    
    @media (min-width: 640px) {
      .notebook-paper::before {
        left: 60px;
      }
    }
    
    .notebook-holes {
      position: absolute;
      left: 15px;
      top: 0;
      bottom: 0;
      width: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 30px 0;
    }
    
    @media (min-width: 640px) {
      .notebook-holes {
        left: 20px;
        width: 30px;
        padding: 40px 0;
      }
    }
    
    .hole {
      width: 14px;
      height: 14px;
      background: linear-gradient(145deg, #d4d4d4, #f0f0f0);
      border-radius: 50%;
      box-shadow: 
        inset 2px 2px 4px rgba(0,0,0,0.2),
        inset -1px -1px 2px rgba(255,255,255,0.5);
    }
    
    @media (min-width: 640px) {
      .hole {
        width: 20px;
        height: 20px;
      }
    }
    
    .spiral-binding {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 35px;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 25px 0;
      z-index: 10;
    }
    
    @media (min-width: 640px) {
      .spiral-binding {
        width: 50px;
        padding: 30px 0;
      }
    }
    
    .spiral-ring {
      width: 30px;
      height: 14px;
      border: 2px solid #4a4a4a;
      border-radius: 50%;
      background: linear-gradient(90deg, #6b6b6b 0%, #8a8a8a 50%, #6b6b6b 100%);
      margin-left: -8px;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    @media (min-width: 640px) {
      .spiral-ring {
        width: 40px;
        height: 18px;
        border: 3px solid #4a4a4a;
        margin-left: -10px;
      }
    }
    
    .page-content {
      padding: 20px 20px 20px 70px;
      min-height: 100%;
      font-family: 'Patrick Hand', cursive;
      font-size: 16px;
      line-height: 20px;
      color: #2c3e50;
    }
    
    @media (min-width: 640px) {
      .page-content {
        padding: 30px 40px 30px 80px;
        font-size: 18px;
      }
    }
    
    .page-content textarea {
      width: 100%;
      height: calc(100% - 40px);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Patrick Hand', cursive;
      font-size: 16px;
      line-height: 20px;
      color: #2c3e50;
      padding: 0;
    }
    
    @media (min-width: 640px) {
      .page-content textarea {
        height: calc(100% - 60px);
        font-size: 18px;
      }
    }
    
    .page-title {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 600;
      color: #34495e;
      border-bottom: 2px solid #c8e0f4;
      padding-bottom: 8px;
      margin-bottom: 15px;
    }
    
    @media (min-width: 640px) {
      .page-title {
        font-size: 28px;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }
    }
    
    .notebook-cover {
      background: linear-gradient(145deg, #2c5282 0%, #1a365d 50%, #2c5282 100%);
      position: relative;
      overflow: hidden;
    }
    
    .notebook-cover::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 4px,
          rgba(255,255,255,0.03) 4px,
          rgba(255,255,255,0.03) 8px
        );
    }
    
    .cover-label {
      background: #f5f5dc;
      border: 2px solid #d4af37;
      border-radius: 4px;
      padding: 20px 40px;
      box-shadow: 
        inset 0 0 10px rgba(0,0,0,0.1),
        3px 3px 8px rgba(0,0,0,0.3);
    }
    
    .page-edge {
      position: absolute;
      right: 0;
      top: 10px;
      bottom: 10px;
      width: 15px;
      background: repeating-linear-gradient(
        to bottom,
        #fefef8 0px,
        #fefef8 2px,
        #e8e8e0 2px,
        #e8e8e0 4px
      );
      border-radius: 0 2px 2px 0;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }
    
    .page-number {
      position: absolute;
      bottom: 20px;
      right: 30px;
      font-family: 'Patrick Hand', cursive;
      font-size: 16px;
      color: #7f8c8d;
    }
    
    .nav-btn {
      transition: all 0.2s ease;
      font-family: 'Patrick Hand', cursive;
    }
    
    .nav-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }
    
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .page-indicator {
      font-family: 'Caveat', cursive;
    }
    
    .paper-shadow {
      box-shadow: 
        0 0 5px rgba(0,0,0,0.1),
        5px 5px 15px rgba(0,0,0,0.2),
        -2px 0 10px rgba(0,0,0,0.05);
    }
    
    @keyframes pageFlip {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(-10deg); }
      100% { transform: rotateY(0deg); }
    }
    
    .page-flip {
      animation: pageFlip 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }
    
    .toast {
      animation: fadeIn 0.3s ease-out;
    }
    
    .toast.hiding {
      animation: fadeOut 0.3s ease-out;
    }
    
    .delete-confirm {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }
  </style>

  <script>
    const defaultConfig = {
      notebook_title: "Il mio Blocco Note"
    };

    let currentPage = 0;
    const totalPages = 5;
    const STORAGE_KEY = 'notebook_pages';
    let saveTimeout;

    // Load saved notes from localStorage
    function loadNotes() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          return {};
        }
      }
      return {};
    }

    // Save notes to localStorage
    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      showToast();
    }

    // Show save confirmation toast
    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.remove('hidden');
      toast.classList.remove('hiding');
      
      setTimeout(() => {
        toast.classList.add('hiding');
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 300);
      }, 2000);
    }

    // Initialize textareas with saved content
    function initializeTextareas() {
      const notes = loadNotes();
      document.querySelectorAll('textarea[data-page]').forEach(textarea => {
        const pageNum = textarea.dataset.page;
        if (notes[pageNum]) {
          textarea.value = notes[pageNum];
        }
        
        // Auto-save on input
        textarea.addEventListener('input', () => {
          clearTimeout(saveTimeout);
          saveTimeout = setTimeout(() => {
            const currentNotes = loadNotes();
            currentNotes[pageNum] = textarea.value;
            saveNotes(currentNotes);
          }, 500);
        });
      });
    }

    function showPage(pageNum) {
      // Hide all pages
      for (let i = 0; i <= totalPages; i++) {
        const page = document.getElementById(`page-${i}`);
        if (page) {
          page.classList.add('hidden');
        }
      }

      // Show target page with animation
      const targetPage = document.getElementById(`page-${pageNum}`);
      if (targetPage) {
        targetPage.classList.remove('hidden');
        targetPage.classList.add('page-flip');
        setTimeout(() => targetPage.classList.remove('page-flip'), 300);
      }

      currentPage = pageNum;
      updateNavigation();
      updateThumbnails();
    }

    function updateNavigation() {
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const currentPageSpan = document.getElementById('currentPage');
      const totalPagesSpan = document.getElementById('totalPages');
      const clearPageBtn = document.getElementById('clearPageBtn');

      prevBtn.disabled = currentPage === 0;
      nextBtn.disabled = currentPage === totalPages;
      clearPageBtn.disabled = currentPage === 0;

      if (currentPage === 0) {
        currentPageSpan.textContent = 'Copertina';
      } else {
        currentPageSpan.textContent = currentPage;
      }
      totalPagesSpan.textContent = totalPages;
    }

    function updateThumbnails() {
      document.querySelectorAll('.page-thumb').forEach(thumb => {
        const page = parseInt(thumb.dataset.page);
        if (page === currentPage) {
          thumb.classList.add('ring-2', 'ring-amber-600', 'ring-offset-2');
        } else {
          thumb.classList.remove('ring-2', 'ring-amber-600', 'ring-offset-2');
        }
      });
    }

    // Clear current page
    function clearCurrentPage() {
      if (currentPage === 0) return;
      
      const textarea = document.querySelector(`textarea[data-page="${currentPage}"]`);
      if (textarea) {
        textarea.value = '';
        const notes = loadNotes();
        delete notes[currentPage];
        saveNotes(notes);
      }
    }

    // Clear all notes
    function clearAllNotes() {
      document.querySelectorAll('textarea[data-page]').forEach(textarea => {
        textarea.value = '';
      });
      localStorage.removeItem(STORAGE_KEY);
      showToast();
      hideDeleteModal();
    }

    // Modal functions
    function showDeleteModal() {
      const modal = document.getElementById('deleteModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function hideDeleteModal() {
      const modal = document.getElementById('deleteModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    // Navigation buttons
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 0) {
        showPage(currentPage - 1);
      }
    });

      if (coverTitle) {

        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined

      return new Map([
        ["notebook_title", config.notebook_title || defaultConfig.notebook_title]
      ]);

      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
