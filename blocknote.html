<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocco Note - Stile Windows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        /* Menu Bar Styling */
        .menu-bar {
            background-color: #fff;
            display: flex;
            font-size: 13px;
            padding: 2px 5px;
            border-bottom: 1px solid #d1d1d1;
            user-select: none;
        }

        .menu-item {
            padding: 4px 8px;
            cursor: default;
            position: relative;
        }

        .menu-item:hover {
            background-color: #e5f3ff;
            outline: 1px solid #91c9f7;
        }

        /* Dropdown menu */
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #f2f2f2;
            min-width: 180px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
            border: 1px solid #ccc;
            padding: 2px;
        }

        .menu-item:hover .dropdown {
            display: block;
        }

        .dropdown-item {
            padding: 5px 25px 5px 30px;
            display: flex;
            justify-content: space-between;
            color: #000;
        }

        .dropdown-item:hover {
            background-color: #91c9f7;
            color: #fff;
        }

        .dropdown-divider {
            height: 1px;
            background-color: #ccc;
            margin: 3px 5px;
        }

        /* Editor Styling */
        #editor {
            flex-grow: 1;
            width: 100%;
            border: none;
            outline: none;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            resize: none;
            line-height: 1.4;
        }

        /* Status Bar */
        .status-bar {
            background-color: #f0f0f0;
            border-top: 1px solid #d1d1d1;
            display: flex;
            justify-content: flex-end;
            padding: 2px 20px;
            font-size: 12px;
            color: #555;
            gap: 20px;
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Menu Bar -->
    <div class="menu-bar">
        <div class="menu-item">
            File
            <div class="dropdown">
                <div class="dropdown-item" onclick="newFile()">Nuovo <span class="text-gray-500">Ctrl+N</span></div>
                <div class="dropdown-item" onclick="triggerOpen()">Apri... <span class="text-gray-500">Ctrl+O</span></div>
                <div class="dropdown-item" onclick="saveFile()">Salva <span class="text-gray-500">Ctrl+S</span></div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="window.close()">Esci</div>
            </div>
        </div>
        <div class="menu-item">
            Modifica
            <div class="dropdown">
                <div class="dropdown-item" onclick="document.execCommand('undo')">Annulla</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="copyText()">Copia</div>
                <div class="dropdown-item" onclick="document.execCommand('cut')">Taglia</div>
                <div class="dropdown-item" onclick="pastePlaceholder()">Incolla</div>
            </div>
        </div>
        <div class="menu-item">
            Formato
            <div class="dropdown">
                <div class="dropdown-item" onclick="toggleWrap()">A capo automatico</div>
            </div>
        </div>
        <div class="menu-item">
            Aiuto
            <div class="dropdown">
                <div class="dropdown-item" onclick="showAbout()">Informazioni</div>
            </div>
        </div>
    </div>

    <!-- Hidden Input for Opening Files -->
    <input type="file" id="fileInput" accept=".txt">

    <!-- Main Text Area -->
    <textarea id="editor" placeholder="Inizia a scrivere..."></textarea>

    <!-- Status Bar -->
    <div class="status-bar">
        <div id="cursorPos">Ln 1, Col 1</div>
        <div>100%</div>
        <div>Windows (CRLF)</div>
        <div>UTF-8</div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const fileInput = document.getElementById('fileInput');
        const cursorPosDisplay = document.getElementById('cursorPos');

        // Update Cursor Position Info
        function updateCursorPos() {
            const textBeforeCursor = editor.value.substring(0, editor.selectionStart);
            const lines = textBeforeCursor.split("\n");
            const currentLine = lines.length;
            const currentCol = lines[lines.length - 1].length + 1;
            cursorPosDisplay.textContent = `Ln ${currentLine}, Col ${currentCol}`;
        }

        editor.addEventListener('keyup', updateCursorPos);
        editor.addEventListener('click', updateCursorPos);
        editor.addEventListener('input', updateCursorPos);

        // File Operations
        function newFile() {
            if (editor.value !== "" && !confirm("Vuoi cancellare il contenuto attuale per un nuovo file?")) {
                return;
            }
            editor.value = "";
            updateCursorPos();
        }

        function triggerOpen() {
            fileInput.click();
        }

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                editor.value = e.target.result;
                updateCursorPos();
            };
            reader.readAsText(file);
        });

        function saveFile() {
            const text = editor.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'senza_titolo.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Edit Operations
        function copyText() {
            editor.select();
            document.execCommand('copy');
        }

        function pastePlaceholder() {
            // Navigator.clipboard requires secure context, using basic notification
            alert("Usa Ctrl+V per incollare il testo direttamente nell'editor.");
        }

        function toggleWrap() {
            if (editor.style.whiteSpace === 'pre') {
                editor.style.whiteSpace = 'pre-wrap';
                editor.style.overflowX = 'hidden';
            } else {
                editor.style.whiteSpace = 'pre';
                editor.style.overflowX = 'auto';
            }
        }

        function showAbout() {
            alert("Blocco Note Web v1.0\nUno strumento semplice in stile Windows creato con Gemini.");
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey) {
                switch(e.key.toLowerCase()) {
                    case 's':
                        e.preventDefault();
                        saveFile();
                        break;
                    case 'n':
                        e.preventDefault();
                        newFile();
                        break;
                    case 'o':
                        e.preventDefault();
                        triggerOpen();
                        break;
                }
            }
        });

        // Initialize focus
        window.onload = () => {
            editor.focus();
        };
    </script>
</body>
</html>
