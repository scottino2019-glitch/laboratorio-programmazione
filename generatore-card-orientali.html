<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore Card Orientali</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .font-chinese { font-family: 'Noto Serif SC', serif; }
        .font-body { font-family: 'Lora', serif; }
    </style>
</head>
<body class="bg-stone-900 h-screen overflow-hidden font-body">

<div id="app" class="flex h-full">

    <!-- SIDEBAR: Controlli del Generatore -->
    <aside class="w-96 bg-stone-800 text-stone-200 flex flex-col h-full border-r border-stone-700 shadow-2xl z-20">
        <div class="p-6 border-b border-stone-700">
            <h1 class="text-2xl font-bold text-white mb-1">HanziBuilder Pro</h1>
            <p class="text-sm text-stone-400">Generatore di UI per app di lingue</p>
        </div>

        <div class="p-6 flex-1 overflow-y-auto space-y-6">
            
            <!-- Tema Colore -->
            <div>
                <label class="block text-sm font-bold mb-2 text-stone-300">Tema Colore</label>
                <div class="grid grid-cols-2 gap-3">
                    <button v-for="(tema, key) in temi" :key="key" 
                            @click="coloreAttivo = key"
                            :class="[
                                'py-2 px-3 rounded text-sm border-2 transition-all',
                                coloreAttivo === key ? 'border-white bg-stone-700' : 'border-stone-700 hover:border-stone-500'
                            ]">
                        <span class="inline-block w-3 h-3 rounded-full mr-2" :class="tema.bg"></span>
                        {{ tema.nome }}
                    </button>
                </div>
            </div>

            <!-- Input Testuali -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold mb-1 text-stone-300">Carattere Sfondo (Filigrana)</label>
                    <input v-model="form.filigrana" type="text" maxlength="2" class="w-full bg-stone-900 border border-stone-600 rounded p-2 text-white font-chinese text-center text-xl focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1 text-stone-300">Sovratitolo</label>
                    <input v-model="form.sovratitolo" type="text" class="w-full bg-stone-900 border border-stone-600 rounded p-2 text-white focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1 text-stone-300">Titolo Principale</label>
                    <input v-model="form.titolo" type="text" class="w-full bg-stone-900 border border-stone-600 rounded p-2 text-white focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-1 text-stone-300">Testo Timbro (1-2 Caratteri)</label>
                    <input v-model="form.timbro" type="text" maxlength="2" class="w-full bg-stone-900 border border-stone-600 rounded p-2 text-white font-chinese text-center text-xl focus:border-blue-500 focus:outline-none">
                </div>
            </div>

        </div>

        <!-- Bottone Export -->
        <div class="p-6 border-t border-stone-700 bg-stone-800">
            <button @click="copiaCodice" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                {{ btnTesto }}
            </button>
        </div>
    </aside>

    <!-- AREA PREVIEW -->
    <main class="flex-1 bg-stone-300 p-8 overflow-y-auto flex flex-col items-center relative">
        <div class="w-full max-w-4xl flex justify-between items-center mb-6">
            <h2 class="text-stone-500 font-bold tracking-widest uppercase text-sm">Anteprima in tempo reale</h2>
        </div>

        <!-- IL COMPONENTE GENERATO (Identico a come apparirà) -->
        <div class="relative w-full bg-[#FCFAF2] shadow-2xl border-4 border-double p-6 md:p-12 overflow-hidden rounded-sm transition-colors duration-300"
             :class="temi[coloreAttivo].border">
            
            <!-- Filigrana -->
            <div class="absolute -top-10 -right-10 text-[15rem] md:text-[25rem] opacity-[0.03] font-chinese pointer-events-none select-none leading-none z-0 transition-colors duration-300"
                 :class="temi[coloreAttivo].text">
                {{ form.filigrana }}
            </div>

            <!-- Decorazioni Angolari -->
            <div class="absolute top-3 left-3 w-6 h-6 md:w-8 md:h-8 border-t-4 border-l-4 z-0 transition-colors duration-300" :class="temi[coloreAttivo].border"></div>
            <div class="absolute top-3 right-3 w-6 h-6 md:w-8 md:h-8 border-t-4 border-r-4 z-0 transition-colors duration-300" :class="temi[coloreAttivo].border"></div>
            <div class="absolute bottom-3 left-3 w-6 h-6 md:w-8 md:h-8 border-b-4 border-l-4 z-0 transition-colors duration-300" :class="temi[coloreAttivo].border"></div>
            <div class="absolute bottom-3 right-3 w-6 h-6 md:w-8 md:h-8 border-b-4 border-r-4 z-0 transition-colors duration-300" :class="temi[coloreAttivo].border"></div>

            <!-- Header -->
            <header class="text-center relative z-10 mt-2 mb-12">
                <h2 class="text-3xl md:text-4xl text-stone-800 font-bold tracking-wide">
                    {{ form.sovratitolo }}
                </h2>  
                <div class="inline-block relative w-full max-w-md mx-auto">
                    <h3 class="text-2xl md:text-3xl font-bold mt-4 mb-8 pb-4 border-b-2 tracking-wide transition-colors duration-300"
                        :class="[temi[coloreAttivo].text, temi[coloreAttivo].borderLight]">
                        {{ form.titolo }}
                    </h3>
                    
                    <!-- Timbro -->
                    <div class="absolute -bottom-2 -right-4 md:-right-8 w-12 h-12 text-white font-chinese flex items-center justify-center text-xl rounded-sm shadow-md border transform -rotate-6 opacity-90 select-none transition-colors duration-300"
                         :class="[temi[coloreAttivo].bg, temi[coloreAttivo].borderDark]">
                        {{ form.timbro }}
                    </div>
                </div>
            </header>

            <!-- Segnaposto Contenuto -->
            <div class="relative z-10 text-stone-800 space-y-8 mt-6">
                <div class="bg-stone-200/40 border-2 border-dashed border-stone-300 rounded-lg p-10 flex flex-col items-center justify-center min-h-[150px] text-stone-500">
                    <p class="font-bold text-lg">Il tuo contenuto andrà qui</p>
                    <p class="text-sm mt-1">Il codice generato includerà questo div segnaposto da sostituire.</p>
                </div>
            </div>
        </div>
    </main>

</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            // Stato dei form
            const form = ref({
                filigrana: '字',
                sovratitolo: 'Introduzione',
                titolo: 'Grammatica Cinese',
                timbro: '语法'
            });

            const btnTesto = ref('Copia Codice HTML');
            const coloreAttivo = ref('red');

            // Configurazione Temi (Classi Tailwind)
            const temi = {
                red: { 
                    nome: 'Rosso Cinabro', 
                    border: 'border-red-900', text: 'text-red-900', bg: 'bg-red-900', 
                    borderLight: 'border-red-900/30', borderDark: 'border-red-950' 
                },
                blue: { 
                    nome: 'Blu Porcellana', 
                    border: 'border-blue-900', text: 'text-blue-900', bg: 'bg-blue-900', 
                    borderLight: 'border-blue-900/30', borderDark: 'border-blue-950' 
                },
                jade: { 
                    nome: 'Verde Giada', 
                    border: 'border-emerald-800', text: 'text-emerald-800', bg: 'bg-emerald-800', 
                    borderLight: 'border-emerald-800/30', borderDark: 'border-emerald-900' 
                },
                gold: { 
                    nome: 'Oro Imperiale', 
                    border: 'border-amber-700', text: 'text-amber-700', bg: 'bg-amber-700', 
                    borderLight: 'border-amber-700/30', borderDark: 'border-amber-800' 
                }
            };

            // Generazione del template HTML Pulito (Compute property)
            const codiceGenerato = computed(() => {
                const t = temi[coloreAttivo.value];
                return `<div class="relative max-w-4xl w-full bg-[#FCFAF2] shadow-2xl border-4 border-double ${t.border} p-6 md:p-12 overflow-hidden rounded-sm font-body">

    <!-- Filigrana -->
    <div class="absolute -top-10 -right-10 text-[15rem] md:text-[25rem] ${t.text} opacity-[0.03] font-chinese pointer-events-none select-none leading-none z-0">
        ${form.value.filigrana}
    </div>

    <!-- Decorazioni Angolari -->
    <div class="absolute top-3 left-3 w-6 h-6 md:w-8 md:h-8 border-t-4 border-l-4 ${t.border} z-0"></div>
    <div class="absolute top-3 right-3 w-6 h-6 md:w-8 md:h-8 border-t-4 border-r-4 ${t.border} z-0"></div>
    <div class="absolute bottom-3 left-3 w-6 h-6 md:w-8 md:h-8 border-b-4 border-l-4 ${t.border} z-0"></div>
    <div class="absolute bottom-3 right-3 w-6 h-6 md:w-8 md:h-8 border-b-4 border-r-4 ${t.border} z-0"></div>

    <!-- Header -->
    <header class="text-center relative z-10 mt-2 mb-12">
        <h2 class="text-3xl md:text-4xl text-stone-800 font-bold tracking-wide">
            ${form.value.sovratitolo}
        </h2>  
        <div class="inline-block relative w-full max-w-md mx-auto">
            <h3 class="text-2xl md:text-3xl ${t.text} font-bold mt-4 mb-8 pb-4 border-b-2 ${t.borderLight} tracking-wide">
                ${form.value.titolo}
            </h3>
            
            <!-- Timbro -->
            <div class="absolute -bottom-2 -right-4 md:-right-8 w-12 h-12 ${t.bg} text-white font-chinese flex items-center justify-center text-xl rounded-sm shadow-md border ${t.borderDark} transform -rotate-6 opacity-90 select-none">
                ${form.value.timbro}
            </div>
        </div>
    </header>

    <!-- AREA CONTENUTO -->
    <div class="relative z-10 text-stone-800 space-y-8 mt-6">
        <!-- Inserisci qui il tuo contenuto -->
    </div>

</div>`;
            });

            // Funzione di copia
            const copiaCodice = () => {
                navigator.clipboard.writeText(codiceGenerato.value).then(() => {
                    btnTesto.value = "Copiato!";
                    setTimeout(() => { btnTesto.value = "Copia Codice HTML"; }, 2000);
                });
            };

            return { form, temi, coloreAttivo, btnTesto, copiaCodice };
        }
    }).mount('#app');
</script>
</body>
</html>
