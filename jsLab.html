<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio JS - Semplice e Funzionante</title>
  <style>
    /* DESIGN PULITO, CLASSICO E AD ALTO CONTRASTO */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #e0e0e0; /* Sfondo generale grigio chiaro */
      color: #000000; /* Testo nero assoluto */
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* BARRA DEGLI STRUMENTI */
    .toolbar {
      background-color: #ffffff;
      padding: 15px;
      border-bottom: 2px solid #000000;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    
    .toolbar span { font-size: 18px; font-weight: bold; }
    
    .toolbar button {
      background-color: #ffffff;
      color: #000000;
      border: 2px solid #000000;
      padding: 10px 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }
    .toolbar button:hover { background-color: #e0e0e0; }
    
    .btn-run {
      background-color: #000000 !important;
      color: #ffffff !important;
      margin-left: auto;
    }
    .btn-run:hover { background-color: #333333 !important; }

    /* LAYOUT PRINCIPALE: Codice a sinistra, Risultato a destra */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .pannello-sinistro {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 3px solid #000000;
    }
    
    .pannello-destro {
      width: 50%;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    .editor-sezione {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-bottom: 3px solid #000000;
    }
    .editor-sezione:last-child { border-bottom: none; }

    .titolo-sezione {
      background-color: #f0f0f0;
      padding: 10px;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #000000;
    }

    /* EDITOR: Font grande, nero su bianco, altissima leggibilità */
    textarea {
      flex: 1;
      width: 100%;
      border: none;
      resize: none;
      padding: 15px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px; /* CARATTERE GRANDE */
      line-height: 1.5;
      background-color: #ffffff;
      color: #000000;
      outline: none;
    }

    iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* VERSIONE CELLULARE: Tutto in colonna */
    @media (max-width: 800px) {
      .workspace { flex-direction: column; overflow: auto; }
      .pannello-sinistro { width: 100%; height: 60vh; border-right: none; border-bottom: 3px solid #000; }
      .pannello-destro { width: 100%; height: 40vh; }
      .toolbar { justify-content: center; }
      .btn-run { margin-left: 0; width: 100%; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <span>Esempi:</span>
    <button onclick="caricaEsempio('card')">Flashcard</button>
    <button onclick="caricaEsempio('vocabolario')">Vocabolario</button>
    <button onclick="caricaEsempio('esercizi')">Esercizi</button>
    <button class="btn-run" onclick="eseguiCodice()">▶ ESEGUI CODICE</button>
  </div>

  <div class="workspace">
    
    <!-- SINISTRA: I due Editor -->
    <div class="pannello-sinistro">
      <div class="editor-sezione">
        <div class="titolo-sezione">HTML / CSS</div>
        <textarea id="codice-html" spellcheck="false"></textarea>
      </div>
      <div class="editor-sezione">
        <div class="titolo-sezione">JavaScript</div>
        <textarea id="codice-js" spellcheck="false"></textarea>
      </div>
    </div>

    <!-- DESTRA: Il Risultato -->
    <div class="pannello-destro">
      <div class="titolo-sezione">Risultato</div>
      <iframe id="iframe-risultato"></iframe>
    </div>

  </div>

  <script>
    // ESEMPI COMPLETI E COMMENTATI
    const esempi = {
      
      card: {
        html: `<div id="carta" class="carta">
  <!-- Questa parola verrà cambiata da JavaScript -->
  <h1 id="testo-carta">Mela</h1>
</div>

<button id="bottone-prossima" class="bottone">Prossima Parola</button>

<style>
  /* Stili semplici per la pagina */
  body { font-family: Arial; text-align: center; margin-top: 50px; }
  
  /* Stile della carta */
  .carta {
    border: 3px solid #000;
    padding: 50px;
    width: 200px;
    margin: 0 auto 20px auto;
    cursor: pointer;
    background-color: #f9f9f9;
  }
  
  /* Stile del bottone */
  .bottone {
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid #000;
    background: #fff;
    cursor: pointer;
  }
</style>`,
        js: `// 1. Creiamo il nostro array (lista) di parole
const parole = [
  { italiano: "Mela", inglese: "Apple" },
  { italiano: "Cane", inglese: "Dog" },
  { italiano: "Libro", inglese: "Book" }
];

// 2. Variabili per tenere traccia di dove siamo
let posizioneAttuale = 0;
let latoInglese = false;

// 3. Troviamo gli elementi HTML tramite il loro ID
const carta = document.getElementById("carta");
const testoCarta = document.getElementById("testo-carta");
const bottone = document.getElementById("bottone-prossima");

// 4. Azione quando clicchiamo la CARTA (Gira la carta)
carta.addEventListener("click", function() {
  if (latoInglese === false) {
    // Mostriamo l'inglese
    testoCarta.textContent = parole[posizioneAttuale].inglese;
    carta.style.backgroundColor = "#e0f7fa"; // Azzurrino
    latoInglese = true;
  } else {
    // Torniamo all'italiano
    testoCarta.textContent = parole[posizioneAttuale].italiano;
    carta.style.backgroundColor = "#f9f9f9"; // Grigio chiaro
    latoInglese = false;
  }
});

// 5. Azione quando clicchiamo il BOTTONE (Prossima parola)
bottone.addEventListener("click", function() {
  // Aumentiamo la posizione di 1
  posizioneAttuale = posizioneAttuale + 1;
  
  // Se abbiamo superato l'ultima parola, torniamo alla prima (0)
  if (posizioneAttuale >= parole.length) {
    posizioneAttuale = 0;
  }
  
  // Aggiorniamo il testo sulla carta rimettendolo in italiano
  testoCarta.textContent = parole[posizioneAttuale].italiano;
  carta.style.backgroundColor = "#f9f9f9";
  latoInglese = false;
});`
      },

      vocabolario: {
        html: `<h2>Cerca nel Vocabolario</h2>
<input type="text" id="barra-ricerca" placeholder="Scrivi una parola...">

<ul id="lista-parole"></ul>

<style>
  body { font-family: Arial; padding: 20px; }
  input {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border: 2px solid #000;
    margin-bottom: 20px;
  }
  ul { list-style: none; padding: 0; }
  li {
    padding: 15px;
    border-bottom: 2px solid #ccc;
    font-size: 18px;
    font-weight: bold;
  }
</style>`,
        js: `// Dati del vocabolario
const dizionario = [
  { it: "Gatto", en: "Cat" },
  { it: "Casa", en: "House" },
  { it: "Albero", en: "Tree" },
  { it: "Tavolo", en: "Table" }
];

const input = document.getElementById("barra-ricerca");
const lista = document.getElementById("lista-parole");

// Funzione per scrivere le parole nell'HTML
function mostraRisultati(risultati) {
  // Svuota la lista HTML esistente
  lista.innerHTML = ""; 
  
  // Ciclo per creare un <li> per ogni risultato
  for (let i = 0; i < risultati.length; i++) {
    const elementoLi = document.createElement("li");
    elementoLi.textContent = risultati[i].it + " = " + risultati[i].en;
    lista.appendChild(elementoLi);
  }
}

// Ascolta quando scrivi nell'input
input.addEventListener("input", function() {
  const testoScritto = input.value.toLowerCase();
  
  // Filtra il dizionario
  const filtrati = dizionario.filter(function(parola) {
    return parola.it.toLowerCase().includes(testoScritto) || 
           parola.en.toLowerCase().includes(testoScritto);
  });
  
  mostraRisultati(filtrati);
});

// Carica tutto il dizionario all'inizio
mostraRisultati(dizionario);`
      },

      esercizi: {
        html: `<h2>Quiz di Inglese</h2>
<h3 id="testo-domanda">Domanda qui...</h3>

<div id="contenitore-bottoni"></div>

<h2 id="messaggio-risultato"></h2>

<style>
  body { font-family: Arial; padding: 20px; }
  button {
    display: block;
    width: 100%;
    padding: 15px;
    margin-bottom: 10px;
    font-size: 18px;
    border: 2px solid #000;
    background-color: #fff;
    cursor: pointer;
  }
</style>`,
        js: `// L'esercizio da risolvere
const esercizio = {
  domanda: "Come si dice 'Acqua' in inglese?",
  opzioni: ["Fire", "Earth", "Water"],
  rispostaCorretta: "Water"
};

// Elementi della pagina
document.getElementById("testo-domanda").textContent = esercizio.domanda;
const divBottoni = document.getElementById("contenitore-bottoni");
const risultato = document.getElementById("messaggio-risultato");

// Creazione dinamica dei bottoni per le opzioni
for (let i = 0; i < esercizio.opzioni.length; i++) {
  const parolaOpzione = esercizio.opzioni[i];
  
  // Crea un nuovo bottone
  const btn = document.createElement("button");
  btn.textContent = parolaOpzione;
  
  // Aggiunge il controllo del click al bottone
  btn.addEventListener("click", function() {
    if (parolaOpzione === esercizio.rispostaCorretta) {
      risultato.textContent = "ESATTO! 🎉";
      risultato.style.color = "green";
      btn.style.backgroundColor = "#d4edda"; // Verde chiaro
    } else {
      risultato.textContent = "SBAGLIATO!";
      risultato.style.color = "red";
      btn.style.backgroundColor = "#f8d7da"; // Rosso chiaro
    }
  });
  
  // Mette il bottone dentro il div contenitore
  divBottoni.appendChild(btn);
}`
      }
    };

    const editorHtml = document.getElementById("codice-html");
    const editorJs = document.getElementById("codice-js");
    const iframe = document.getElementById("iframe-risultato");

    // Carica i testi negli editor
    function caricaEsempio(nome) {
      editorHtml.value = esempi[nome].html;
      editorJs.value = esempi[nome].js;
      eseguiCodice();
    }

    // IL MOTORE FUNZIONANTE AL 100%: 
    // Questa tecnica inietta il JS direttamente come nodo, evitando i bug delle stringhe HTML
    function eseguiCodice() {
      const htmlText = editorHtml.value;
      const jsText = editorJs.value;
      
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      
      // 1. Scriviamo solo l'HTML pulito
      doc.open();
      doc.write(htmlText);
      doc.close();
      
      // 2. Catturiamo eventuali errori di sintassi per aiutarti
      const scriptErrore = doc.createElement("script");
      scriptErrore.textContent = `
        window.onerror = function(messaggio, sorgente, riga) {
          const divErrore = document.createElement("div");
          divErrore.style.cssText = "color: white; background: red; padding: 15px; margin-top: 20px; font-family: Arial; font-weight: bold;";
          divErrore.textContent = "Errore JavaScript: " + messaggio;
          document.body.appendChild(divErrore);
          return false;
        };
      `;
      doc.head.appendChild(scriptErrore);

      // 3. Aggiungiamo ed eseguiamo il tuo JavaScript in totale sicurezza
      const scriptLogica = doc.createElement("script");
      scriptLogica.textContent = jsText;
      doc.body.appendChild(scriptLogica);
    }

    // Parte automaticamente col primo esempio
    caricaEsempio("card");
  </script>
</body>
</html>

```
