```html
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JS Mobile Lab - Soft Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Palette colori Soft Dark per non affaticare la vista */
        :root {
            --bg-main: #1e293b;    /* Grigio ardesia profondo */
            --bg-editor: #0f172a;  /* Quasi nero per l'editor */
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --border: #334155;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main); 
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Editor Style: Font più grande per mobile */
        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-editor);
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 20px;
            background: var(--bg-editor);
            color: #e2e8f0;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 18px; /* Testo più grande */
            line-height: 1.6;
            border: none;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            caret-color: var(--accent);
        }

        /* Preview Style */
        #preview-container {
            flex: 1;
            background: var(--bg-main);
            overflow-y: auto;
            display: none;
        }

        .active-view { display: flex !important; }

        /* Componenti UI nelle card di anteprima */
        .app-card {
            background: #334155;
            padding: 24px;
            border-radius: 20px;
            border: 1px solid #475569;
            margin-bottom: 15px;
            color: white;
        }

        /* Bottoni e Input nell'anteprima */
        .btn-primary {
            background: var(--accent);
            color: #0f172a;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            font-size: 16px;
        }

        input, textarea.inner-input {
            background: #1e293b !important;
            color: white !important;
            border: 2px solid #475569 !important;
            padding: 12px;
            border-radius: 10px;
        }

        /* Toolbar superiore */
        .toolbar {
            display: flex;
            overflow-x: auto;
            background: #0f172a;
            padding: 12px;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .tool-btn {
            background: #334155;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid #475569;
        }

        /* Navigazione inferiore */
        .tab-bar {
            height: 75px;
            background: #0f172a;
            display: flex;
            border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tab-item.active {
            color: var(--accent);
            background: #1e293b;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="h-14 bg-[#0f172a] flex items-center justify-between px-4 border-b border-slate-800">
        <span class="text-white font-black italic tracking-tighter text-lg">JS_LAB SOFT</span>
        <button onclick="executeCode()" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-black text-sm shadow-lg active:scale-95 transition-transform">
            ESEGUI ▶
        </button>
    </div>

    <!-- Selettore Logiche (I tuoi tasti originali) -->
    <div class="toolbar no-scrollbar">
        <button onclick="loadTemplate('cards')" class="tool-btn text-sky-400">JSON CARDS</button>
        <button onclick="loadTemplate('storage')" class="tool-btn">LOCAL STORAGE</button>
        <button onclick="loadTemplate('quiz')" class="tool-btn">QUIZ DINAMICO</button>
        <button onclick="loadTemplate('list')" class="tool-btn">LISTA TASK</button>
    </div>

    <!-- Contenuto Principale -->
    <div id="editor-container" class="active-view">
        <textarea id="code-input" spellcheck="false"></textarea>
    </div>

    <div id="preview-container">
        <div id="output" class="p-6 w-full">
            <!-- Qui viene renderizzato il codice JS -->
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="tab-bar">
        <div id="tab-editor" onclick="switchView('editor')" class="tab-item active">Codice</div>
        <div id="tab-preview" onclick="switchView('preview')" class="tab-item">Anteprima</div>
    </div>

    <script>
        const input = document.getElementById('code-input');
        const output = document.getElementById('output');
        const editorCont = document.getElementById('editor-container');
        const previewCont = document.getElementById('preview-container');

        // I tuoi template originali ripristinati
        const templates = {
            cards: `/* 1. GENERATORE DI CARD DA JSON */
const data = [
  { titolo: "Progetto Alpha", desc: "Sistema di automazione", tag: "AI" },
  { titolo: "Web App Beta", desc: "Dashboard gestionale", tag: "Cloud" },
  { titolo: "Mobile Gamma", desc: "App per fitness", tag: "App" }
];

output.innerHTML = '<h2 class="text-2xl font-bold mb-6 text-white">Card Generate:</h2>';

data.forEach(item => {
  const card = document.createElement('div');
  card.className = "app-card border-l-8 border-sky-400";
  card.innerHTML = \`
    <span class="text-xs font-bold text-sky-400 bg-sky-900/50 px-3 py-1 rounded-full uppercase">\${item.tag}</span>
    <h3 class="font-bold text-2xl mt-3 text-white">\${item.titolo}</h3>
    <p class="text-slate-300 text-lg mt-2">\${item.desc}</p>
  \`;
  output.appendChild(card);
});`,

            storage: `/* 2. PERSISTENZA DATI (LocalStorage) */
const savedText = localStorage.getItem('mio_testo') || "";

output.innerHTML = \`
  <div class="app-card">
    <p class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">Memoria Browser:</p>
    <textarea id="myNote" class="inner-input w-full h-32 mb-5 text-xl outline-none" placeholder="Scrivi una nota...">\${savedText}</textarea>
    <button id="saveBtn" class="w-full bg-sky-500 text-slate-900 py-4 rounded-2xl font-black text-xl">SALVA ORA</button>
    <div id="status" class="hidden mt-4 text-center text-emerald-400 font-bold text-lg">Dato salvato con successo!</div>
  </div>
\`;

document.getElementById('saveBtn').onclick = () => {
  const val = document.getElementById('myNote').value;
  localStorage.setItem('mio_testo', val);
  
  const s = document.getElementById('status');
  s.classList.remove('hidden');
  setTimeout(() => s.classList.add('hidden'), 2000);
};`,

            quiz: `/* 3. GENERATORE DI ESERCIZI */
function nuovoQuiz() {
    const a = Math.floor(Math.random() * 12) + 1;
    const b = Math.floor(Math.random() * 12) + 1;
    const soluzione = a + b;

    output.innerHTML = \`
      <div class="app-card text-center">
        <p class="text-slate-400 font-bold text-sm uppercase mb-4">Esercizio di Calcolo</p>
        <h2 class="text-6xl font-black mb-8 text-white">\${a} + \${b} = ?</h2>
        <input type="number" id="risp" class="w-full p-5 text-4xl text-center rounded-2xl mb-6 outline-none" placeholder="?">
        <button id="btnCheck" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-black text-2xl">VERIFICA</button>
      </div>
    \`;

    document.getElementById('btnCheck').onclick = () => {
        const userVal = parseInt(document.getElementById('risp').value);
        if(userVal === soluzione) {
            alert("CORRETTO! 🎉");
            nuovoQuiz();
        } else {
            alert("SBAGLIATO! ❌");
        }
    };
}
nuovoQuiz();`,

            list: `/* 4. LISTA TASK DINAMICA */
output.innerHTML = \`
  <div class="app-card">
    <div class="flex gap-3 mb-6">
      <input id="taskIn" class="flex-1 p-4 rounded-xl text-lg outline-none" placeholder="Cosa devi fare?">
      <button id="addBtn" class="bg-sky-500 text-slate-900 px-6 rounded-xl font-black text-2xl">+</button>
    </div>
    <ul id="lista" class="space-y-3"></ul>
  </div>
\`;

const taskIn = document.getElementById('taskIn');
const lista = document.getElementById('lista');

document.getElementById('addBtn').onclick = () => {
    if(!taskIn.value) return;
    const li = document.createElement('li');
    li.className = "flex justify-between items-center bg-slate-700/50 p-4 rounded-2xl border border-slate-600";
    li.innerHTML = \`
        <span class="text-white text-lg font-medium">\${taskIn.value}</span>
        <button class="text-red-400 font-black text-xl p-2" onclick="this.parentElement.remove()">✕</button>
    \`;
    lista.appendChild(li);
    taskIn.value = "";
};`
        };

        function switchView(view) {
            if(view === 'editor') {
                editorCont.classList.add('active-view');
                previewCont.classList.remove('active-view');
                document.getElementById('tab-editor').classList.add('active');
                document.getElementById('tab-preview').classList.remove('active');
            } else {
                editorCont.classList.remove('active-view');
                previewCont.classList.add('active-view');
                document.getElementById('tab-editor').classList.remove('active');
                document.getElementById('tab-preview').classList.add('active');
            }
        }

        function loadTemplate(key) {
            input.value = templates[key];
            switchView('editor');
            executeCode(); 
        }

        function executeCode() {
            output.innerHTML = '';
            try {
                const run = new Function('output', 'document', 'localStorage', input.value);
                run(output, document, localStorage);
                switchView('preview');
            } catch (err) {
                switchView('preview');
                output.innerHTML = `
                    <div class="bg-red-900/30 border-2 border-red-500 p-6 rounded-2xl">
                        <p class="text-red-400 font-bold text-xl">Errore nel codice:</p>
                        <p class="text-red-200 font-mono text-lg mt-3">${err.message}</p>
                    </div>
                `;
            }
        }

        // Toast personalizzato per mobile
        window.alert = (msg) => {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-8 py-4 rounded-2xl shadow-2xl z-[500] font-black text-lg whitespace-nowrap";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        };

        window.onload = () => loadTemplate('cards');
    </script>
</body>
</html>
