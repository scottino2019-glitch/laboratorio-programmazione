<html lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Video solo testo</title>
    <style> 
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 800px;
            margin: 0 auto;
        } 
        .controls-group {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .controls-group label {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            font-weight: bold;
        }
        .controls-group input, .controls-group select {
            margin-top: 5px;
            padding: 5px;
        }
        #slidesContainer > div { 
            margin-bottom: 10px; 
            padding: 10px;
            background: #eef;
            border-radius: 5px;
            display: flex;
            gap: 10px;
            align-items: center;
        } 
        button { 
            margin-top: 10px; 
            padding: 8px 15px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #videoPreview { 
            max-width: 100%; 
            margin-top: 20px; 
            display: block; 
            background: #000;
            border-radius: 8px;
        }
        a#downloadLink {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Video di solo testo</h1>
    
    <h3>Stile globale:</h3>
    <div class="controls-group">
        <label>Sfondo: 
            <input type="color" id="bgColor" value="#222222">
        </label>
        <label>Colore Testo: 
            <input type="color" id="textColor" value="#FFFFFF">
        </label>
        <label>Dimensione (px): 
            <input type="number" id="fontSize" value="40" min="10" max="150">
        </label>
        <label>Font: 
            <select id="fontFamily"> 
                <option value="Arial" selected>Arial</option> 
                <option value="Verdana">Verdana</option> 
                <option value="Tahoma">Tahoma</option>
                <option value="Trebuchet MS">Trebuchet MS</option>
                <option value="Times New Roman">Times New Roman</option> 
                <option value="Georgia">Georgia</option>
                <option value="Courier New">Courier New</option> 
                <option value="Impact">Impact</option>
                <option value="Comic Sans MS">Comic Sans MS</option>
            </select>
        </label>
    </div>

    <h3>Slide:</h3>
    <div id="slidesContainer"></div>
    <button id="addSlideBtn">Aggiungi slide</button>
    <button id="generaBtn" style="background-color: #28a745;">Genera Video</button>
    
    <h2>Risultato:</h2>
    <video id="videoPreview" controls></video><br/>
    <a id="downloadLink" href="#" download="video.webm" style="display: none;">Scarica il video</a>
    
    <script>
        const slides = [];
        
        // Aggiungi una slide di default all'avvio
        window.onload = () => document.getElementById('addSlideBtn').click();

        document.getElementById('addSlideBtn').onclick = () => { 
            const container = document.getElementById('slidesContainer'); 
            const div = document.createElement('div'); 
            div.innerHTML = ` 
                <label>Secondi: <input type="number" min="1" value="2" style="width:60px;" required></label> 
                <input type="text" placeholder="Testo della slide" style="flex:1;" required> 
                <button type="button" onclick="this.parentElement.remove()" style="margin-top:0; background-color:#dc3545;">X</button>
            `; 
            container.appendChild(div);
        };

        document.getElementById('generaBtn').onclick = async () => { 
            // Raccogli dati
            slides.length = 0; 
            const divs = document.querySelectorAll('#slidesContainer > div'); 
            for (const div of divs) { 
                const inputs = div.querySelectorAll('input'); 
                const duration = parseFloat(inputs[0].value); 
                const text = inputs[1].value; 
                if (isNaN(duration) || !text) { 
                    alert('Completa tutti i campi delle slide'); 
                    return; 
                } 
                slides.push({ duration, text }); 
            }
            
            if(slides.length === 0) {
                alert('Aggiungi almeno una slide');
                return;
            }

            // Opzioni stile
            const color = document.getElementById('textColor').value; 
            const font = document.getElementById('fontFamily').value;
            const bgColor = document.getElementById('bgColor').value;
            const fontSize = document.getElementById('fontSize').value;

            document.getElementById('generaBtn').innerText = "Generazione in corso...";
            document.getElementById('generaBtn').disabled = true;

            await creaVideo(slides, { color, font, bgColor, fontSize });

            document.getElementById('generaBtn').innerText = "Genera Video";
            document.getElementById('generaBtn').disabled = false;
        };

        async function creaVideo(slides, options) { 
            const { color, font, bgColor, fontSize } = options; 
            const width = 640; 
            const height = 480;
            
            const canvas = document.createElement('canvas'); 
            const ctx = canvas.getContext('2d'); 
            canvas.width = width; 
            canvas.height = height;
            
            const stream = canvas.captureStream(30); 
            const chunks = []; 
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); 
            recorder.ondataavailable = e => { 
                if (e.data.size > 0) chunks.push(e.data); 
            }; 
            recorder.start();
            
            // Disegna ogni slide
            for (const slide of slides) { 
                // Disegna Sfondo
                ctx.fillStyle = bgColor; 
                ctx.fillRect(0, 0, width, height); 
                
                // Disegna Testo
                ctx.font = `${fontSize}px ${font}`; 
                ctx.fillStyle = color; 
                ctx.textAlign = 'center'; 
                ctx.textBaseline = 'middle'; // Assicura una centratura verticale perfetta
                ctx.fillText(slide.text, width/2, height/2); 
                
                // Attendi per la durata
                const framesCount = Math.round(30 * slide.duration); // 30 fps 
                for (let f=0; f<framesCount; f++) { 
                    await new Promise(requestAnimationFrame); 
                } 
            }
            
            // Ferma il recorder
            recorder.stop();
            await new Promise(resolve => { recorder.onstop = resolve; }); 
            
            const blob = new Blob(chunks, { type: 'video/webm' }); 
            const url = URL.createObjectURL(blob); 
            document.getElementById('videoPreview').src = url; 
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
        }
    </script>
</body>
</html>
